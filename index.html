<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MK1 Tracker">
<meta name="theme-color" content="#15181f">
<title>MK1 Workout Tracker</title>
<style>
:root{
  --paper:#15181f; --card:#1e2230;
  --accent:#e2502a; --accent2:#c8401f;
  --mute:#8a90a0; --line:#2e3445; --text:#eceef2;
  --good:#3fae6a; --chip:#252c3a;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;background:var(--paper);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{padding-top:var(--safe-top);padding-bottom:var(--safe-bot)}
#app{max-width:500px;margin:0 auto;padding:14px 14px 100px}

.sync-banner{background:#2a1f1f;border:1.5px solid #5a3030;color:#e0a890;border-radius:14px;
  padding:12px 14px;font-size:12.5px;line-height:1.5;margin-bottom:14px}
.sync-ok{background:var(--chip);border:1.5px solid var(--line);color:var(--mute);border-radius:14px;
  padding:10px 14px;font-size:12px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sync-ok .dot{width:7px;height:7px;border-radius:50%;background:var(--good);flex-shrink:0}

.page-header{padding:6px 0 4px}
.kicker{color:var(--accent);font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase}
.page-header h1{font-size:26px;font-weight:800;letter-spacing:-.03em;margin-top:2px}
.page-header p{color:var(--mute);font-size:13px;margin-top:4px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.scard{background:var(--card);border:1.5px solid var(--line);border-radius:16px;
  padding:16px 14px;cursor:pointer;transition:transform .08s;position:relative;overflow:hidden}
.scard:active{transform:scale(.97)}
.scard::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:0;transition:opacity .2s}
.scard.has-data::before{opacity:1}
.scard h2{font-size:16px;font-weight:800;letter-spacing:-.01em}
.scard .focus{color:var(--mute);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.scard .last{color:var(--mute);font-size:12px;margin-top:12px;line-height:1.4}
.scard .last b{color:var(--text)}

.histbtn{margin-top:12px;width:100%;background:none;border:1.5px dashed var(--line);
  color:var(--mute);border-radius:14px;padding:13px;font-size:14px;font-weight:700;cursor:pointer}

.topbar{display:flex;align-items:center;gap:10px;padding:6px 0 12px}
.back{background:var(--chip);border:none;color:var(--text);border-radius:11px;
  padding:9px 14px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.topbar-info{flex:1;min-width:0}
.topbar-info h2{font-size:19px;font-weight:800;letter-spacing:-.02em}
.topbar-info .focus{color:var(--accent);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.timer-chip{flex-shrink:0;background:var(--chip);border:1.5px solid var(--line);border-radius:11px;
  padding:7px 12px;text-align:center;line-height:1.1}
.timer-chip .tlabel{color:var(--mute);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.timer-chip .tval{color:var(--accent);font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:1px}

.ex{background:var(--card);border:1.5px solid var(--line);border-radius:16px;
  padding:14px;margin-bottom:10px;transition:border-color .2s}
.ex.done{border-color:var(--good)}
.ex-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:2px}
.ex-name{font-weight:700;font-size:15px;line-height:1.3}
.ex-thumb{width:100%;max-width:220px;border-radius:10px;object-fit:cover;display:block;margin-bottom:8px}
.ex-note{color:var(--mute);font-size:12px;font-style:italic;margin-top:2px;line-height:1.4}
.scheme{color:var(--accent);font-weight:800;font-size:13px;white-space:nowrap;flex-shrink:0}
.prev{color:var(--mute);font-size:12px;margin:5px 0 10px;line-height:1.4}
.prev b{color:var(--text)}

.sets{display:flex;flex-direction:column;gap:7px}
.setrow{display:grid;grid-template-columns:24px 1fr 1fr 42px 26px;gap:6px;align-items:center}
.setn{color:var(--mute);font-size:12px;font-weight:800;text-align:center}
.field{position:relative}
.setrow input{width:100%;background:var(--chip);border:1.5px solid var(--line);color:var(--text);
  border-radius:10px;padding:10px 6px;font-size:17px;font-weight:700;text-align:center;
  -webkit-appearance:none;appearance:none}
.setrow input:focus{outline:none;border-color:var(--accent)}
.setrow input::placeholder{color:#454e62;font-weight:600}
.trend-ind{position:absolute;top:-6px;right:-5px;width:15px;height:15px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;
  background:var(--chip);border:1.5px solid var(--line);color:var(--mute);opacity:0;
  transition:opacity .15s;pointer-events:none}
.trend-ind.up,.trend-ind.down,.trend-ind.same{opacity:1}
.trend-ind.up{background:var(--good);border-color:var(--good);color:#fff}
.trend-ind.down{background:var(--accent2);border-color:var(--accent2);color:#fff}
.trend-ind.same{background:var(--chip);border-color:var(--mute);color:var(--mute)}
.tick{background:var(--chip);border:1.5px solid var(--line);color:var(--mute);
  border-radius:10px;height:44px;font-size:18px;cursor:pointer;width:100%}
.tick.on{background:var(--good);border-color:var(--good);color:#fff}
.remove-set{background:none;border:none;color:#5a6070;font-size:18px;cursor:pointer;height:44px;width:100%}
.remove-set:active{color:#a04030}
.addset-btn{background:none;border:none;color:var(--mute);font-size:12px;font-weight:700;
  padding:8px 0 2px;cursor:pointer;letter-spacing:.04em}

.savebar{position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,var(--paper) 30%);padding:16px 14px calc(16px + var(--safe-bot));pointer-events:none}
.savebar .inner{max-width:500px;margin:0 auto;pointer-events:all}
.save-btn{width:100%;background:var(--accent2);border:none;color:#fff;border-radius:16px;
  padding:17px;font-size:17px;font-weight:800;cursor:pointer}
.save-btn:disabled{opacity:.4}

.toast{position:fixed;top:calc(16px + var(--safe-top));left:50%;transform:translateX(-50%);
  background:var(--good);color:#fff;padding:11px 20px;border-radius:99px;
  font-weight:700;font-size:14px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:99;white-space:nowrap}
.toast.show{opacity:1}

.hday{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px}
.hday-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.hday-head b{font-size:15px;font-weight:800}
.hday-head span{color:var(--mute);font-size:12px}
.hday-head .dur{color:var(--accent);font-weight:700}
.hrow{display:flex;justify-content:space-between;gap:10px;font-size:13px;
  padding:6px 0;border-top:1px solid var(--line);align-items:baseline}
.hrow .hn{color:var(--mute);flex:1}
.hrow .hv{font-weight:700;text-align:right;white-space:nowrap;color:var(--text)}
.del-btn{background:none;border:none;color:#7a4040;font-size:12px;font-weight:700;cursor:pointer;padding:8px 0 0}

.empty{color:var(--mute);text-align:center;padding:50px 20px;font-size:14px;line-height:1.7}
.empty strong{color:var(--text);display:block;font-size:16px;margin-bottom:8px}
.section-label{color:var(--mute);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;
  margin:20px 0 10px;display:flex;align-items:center;justify-content:space-between}
.icon-btn{background:var(--chip);border:1.5px solid var(--line);color:var(--text);border-radius:9px;
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;
  cursor:pointer;flex-shrink:0}
.icon-btn:active{border-color:var(--accent)}
.label-actions{display:flex;gap:6px}
.loading{color:var(--mute);text-align:center;padding:60px 20px;font-size:14px}
.last-updated{text-align:center;color:var(--mute);font-size:12px;margin:6px 0 18px;line-height:1.6}
.last-updated b{color:var(--text)}

.profile-wrap{padding-top:40px}
.profile-title{text-align:center;margin-bottom:30px}
.profile-title h1{margin-top:6px}
.profile-grid{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.profile-card{background:var(--card);border:1.5px solid var(--line);border-radius:20px;padding:24px 20px;
  width:140px;text-align:center;cursor:pointer;transition:transform .08s,border-color .15s}
.profile-card:active{transform:scale(.96)}
.profile-avatar{width:56px;height:56px;border-radius:50%;background:var(--accent2);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;margin:0 auto 12px;
  background-size:cover;background-position:center}
.photo-upload-row{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.photo-preview{width:72px;height:72px;border-radius:50%;background:var(--accent2);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;flex-shrink:0;
  background-size:cover;background-position:center}
.photo-upload-actions{display:flex;flex-direction:column;gap:8px;flex:1}
.photo-upload-btn{background:var(--chip);border:1.5px solid var(--line);color:var(--text);
  border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;text-align:center}
.photo-remove-btn{background:none;border:none;color:#a04030;font-size:12px;font-weight:700;
  cursor:pointer;padding:0;text-align:left}
.profile-name{font-size:16px;font-weight:800}

.auth-wrap{padding-top:40px;max-width:380px;margin:0 auto}
.auth-title{text-align:center;margin-bottom:22px}
.auth-tabs{display:flex;background:var(--chip);border:1.5px solid var(--line);border-radius:12px;
  padding:3px;margin-bottom:18px}
.auth-tabs button{flex:1;background:none;border:none;color:var(--mute);font-size:13px;font-weight:700;
  padding:10px 4px;border-radius:9px;cursor:pointer}
.auth-tabs button.active{background:var(--accent2);color:#fff}
.auth-field{margin-bottom:12px}
.auth-field label{display:block;color:var(--mute);font-size:11px;font-weight:800;
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.auth-field input{width:100%;background:var(--chip);border:1.5px solid var(--line);color:var(--text);
  border-radius:10px;padding:12px;font-size:15px;font-weight:600;-webkit-appearance:none;appearance:none}
.auth-field input:focus{outline:none;border-color:var(--accent)}
.auth-btn{width:100%;background:var(--accent2);border:none;color:#fff;border-radius:14px;
  padding:15px;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px}
.auth-error{background:#2a1f1f;border:1.5px solid #5a3030;color:#e0a890;border-radius:10px;
  padding:10px 12px;font-size:12.5px;margin-bottom:12px}
.claim-grid{display:flex;gap:8px;flex-wrap:wrap}
.claim-card{flex:1;min-width:88px;background:var(--card);border:1.5px solid var(--line);
  border-radius:12px;padding:12px 6px;text-align:center;cursor:pointer}
.claim-card.active{border-color:var(--accent)}
.claim-card .claim-avatar{width:38px;height:38px;border-radius:50%;background:var(--accent2);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;margin:0 auto 6px;
  background-size:cover;background-position:center}
.claim-card .claim-name{font-size:11.5px;font-weight:700}

.switch-profile{display:inline-flex;align-items:center;gap:6px;background:var(--chip);border:1px solid var(--line);
  border-radius:99px;padding:5px 12px 5px 6px;font-size:11.5px;font-weight:700;color:var(--text);
  cursor:pointer;margin-top:10px}
.avatar-sm{width:18px;height:18px;border-radius:50%;background:var(--accent2);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;
  background-size:cover;background-position:center}

.weightbtn{margin-top:10px;width:100%;background:var(--card);border:1.5px solid var(--line);
  color:var(--text);border-radius:14px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between}
.weightbtn .wb-label{display:flex;align-items:center;gap:8px}
.weightbtn .wb-current{color:var(--accent);font-weight:800}

.stat-row{display:flex;gap:8px;margin-bottom:14px}
.stat-card{flex:1;background:var(--card);border:1.5px solid var(--line);border-radius:14px;
  padding:12px 8px;text-align:center}
.stat-card .label{color:var(--mute);font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em}
.stat-card .value{font-size:17px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums}
.stat-card .value.up{color:var(--accent)}
.stat-card .value.down{color:var(--good)}
.stat-card .value.flat{color:var(--mute)}
.stat-card .label .metric-delta{display:block;font-size:10px;font-weight:800;margin-top:2px;text-transform:none;letter-spacing:0}
.metric-delta.up{color:var(--good)}
.metric-delta.down{color:var(--accent)}
.metric-delta.flat{color:var(--mute)}
.radar-legend{display:flex;gap:18px;justify-content:center;margin-top:4px;font-size:11px;color:var(--mute)}
.radar-legend .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px}

.chart-card{background:var(--card);border:1.5px solid var(--line);border-radius:16px;
  padding:14px 10px;margin-bottom:14px}
.chart-card svg{width:100%;height:auto;display:block;overflow:visible}
.chart-empty{color:var(--mute);font-size:13px;text-align:center;padding:34px 10px;line-height:1.6}

.weight-form{display:flex;gap:8px;margin-bottom:16px}
.weight-form input{flex:1;background:var(--chip);border:1.5px solid var(--line);color:var(--text);
  border-radius:10px;padding:12px;font-size:16px;font-weight:700;text-align:center;
  -webkit-appearance:none;appearance:none}
.weight-form input:focus{outline:none;border-color:var(--accent)}
.weight-form button{background:var(--accent2);border:none;color:#fff;border-radius:10px;
  padding:0 20px;font-weight:800;font-size:14px;cursor:pointer;flex-shrink:0}

.wrow{display:flex;justify-content:space-between;align-items:center;font-size:13px;
  padding:9px 0;border-top:1px solid var(--line)}
.wrow .wd{color:var(--mute)}
.wrow .wv{font-weight:800;font-size:14px}
.wrow .wdelta{font-size:11px;font-weight:700;margin-left:6px}
.wrow .wdelta.up{color:var(--accent)}
.wrow .wdelta.down{color:var(--good)}
.wrow .wright{display:flex;align-items:center;gap:10px}
.wdel{background:none;border:none;color:#5a6070;font-size:16px;cursor:pointer;padding:0 2px}
.wdel:active{color:#a04030}

.qr-card{background:#fff;border-radius:18px;padding:16px;margin:0 auto 16px;max-width:320px;
  display:flex;justify-content:center}
.qr-card img{width:100%;max-width:300px;display:block;border-radius:8px}
.qr-empty{color:var(--mute);text-align:center;padding:50px 20px;font-size:14px;line-height:1.7}
.qr-empty strong{color:var(--text);display:block;font-size:16px;margin-bottom:8px}

.rest-bar{display:flex;gap:8px;align-items:center;margin:6px 0 18px}
.rest-chip{background:var(--chip);border:1.5px solid var(--line);color:var(--text);
  border-radius:10px;padding:9px 13px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
.rest-chip:active{border-color:var(--accent)}
.rest-display{flex:1;text-align:center;background:var(--card);border:1.5px solid var(--line);
  border-radius:10px;padding:9px;font-weight:800;font-size:15px;font-variant-numeric:tabular-nums;
  cursor:pointer;transition:background .2s,border-color .2s}
.rest-display.running{background:var(--accent2);border-color:var(--accent2);color:#fff}

.streakbtn{margin-top:10px;width:100%;background:var(--card);border:1.5px solid var(--line);
  color:var(--text);border-radius:14px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between}
.streak-hero{text-align:center;background:var(--card);border:1.5px solid var(--line);
  border-radius:16px;padding:22px;margin-bottom:16px}
.streak-hero .num{font-size:40px;font-weight:800;color:var(--accent)}
.streak-hero .lbl{color:var(--mute);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.heat-outer{display:flex;gap:6px}
.heat-daylabels{display:flex;flex-direction:column;gap:3px;flex-shrink:0;padding-top:0}
.heat-daylabel{width:11px;height:11px;font-size:8px;line-height:11px;text-align:center;color:var(--mute)}
.heat-wrap{overflow-x:auto;padding-bottom:6px}
.heat-grid{display:flex;gap:3px}
.heat-col{display:flex;flex-direction:column;gap:3px}
.heat-cell{width:11px;height:11px;border-radius:2px;background:var(--chip);border:1px solid var(--line)}
.heat-cell.on{background:var(--good);border-color:var(--good)}
.heat-legend{display:flex;align-items:center;gap:6px;color:var(--mute);font-size:11px;margin-top:10px}

.measurebtn{margin-top:10px;width:100%;background:var(--card);border:1.5px solid var(--line);
  color:var(--text);border-radius:14px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between}
.seg{display:flex;background:var(--chip);border:1.5px solid var(--line);border-radius:12px;
  padding:3px;margin-bottom:14px}
.seg button{flex:1;background:none;border:none;color:var(--mute);font-size:13px;font-weight:700;
  padding:9px 4px;border-radius:9px;cursor:pointer}
.seg button.active{background:var(--accent2);color:#fff}
.measure-form{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.measure-form .mrow{display:flex;gap:8px;align-items:center}
.measure-form label{width:54px;color:var(--mute);font-size:12px;font-weight:700;flex-shrink:0}
.measure-form input{flex:1;background:var(--chip);border:1.5px solid var(--line);color:var(--text);
  border-radius:10px;padding:11px;font-size:16px;font-weight:700;text-align:center;
  -webkit-appearance:none;appearance:none}
.measure-form input:focus{outline:none;border-color:var(--accent)}
.measure-form button.save-measure{background:var(--accent2);border:none;color:#fff;border-radius:10px;
  padding:12px;font-weight:800;font-size:14px;cursor:pointer;margin-top:4px}

.leaderbtn{margin-top:10px;width:100%;background:var(--card);border:1.5px solid var(--line);
  color:var(--text);border-radius:14px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between}
.lb-head{display:flex;justify-content:space-around;align-items:center;margin-bottom:16px}
.lb-person{text-align:center}
.lb-person .lb-avatar{width:64px;height:64px;border-radius:50%;background:var(--accent2);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;margin:0 auto 8px;
  background-size:cover;background-position:center}
.lb-person .lb-name{font-weight:800;font-size:14px}
.lb-vs{color:var(--mute);font-size:12px;font-weight:800}
.lb-row{display:grid;grid-template-columns:1fr 70px 1fr;align-items:center;gap:8px;
  background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:14px 12px;margin-bottom:10px}
.lb-row .lb-val{font-size:20px;font-weight:800;text-align:center}
.lb-row .lb-val.lead{color:var(--accent)}
.lb-row .lb-label{color:var(--mute);font-size:10.5px;font-weight:800;text-transform:uppercase;
  letter-spacing:.06em;text-align:center}
.lb-loading{color:var(--mute);text-align:center;padding:60px 20px;font-size:14px}
.lbrank-row{display:flex;align-items:center;gap:12px;background:var(--card);border:1.5px solid var(--line);
  border-radius:14px;padding:12px 14px;margin-bottom:10px}
.lbrank-row .lbr-avatar{width:40px;height:40px;border-radius:50%;background:var(--accent2);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0;
  background-size:cover;background-position:center}
.lbrank-row .lbr-info{flex:1}
.lbrank-row .lbr-name{font-weight:800;font-size:14px}

function avatarHtml(p, cls){
  const photo = p.photo || KNOWN_PHOTOS[p.id];
  return photo
    ? `<div class="${cls}" style="background-image:url('${photo}')"></div>`
    : `<div class="${cls}">${(p.name||"?")[0]}</div>`;
}

// The directory of everyone using this tracker (clients and trainers) now
// lives in Firestore instead of being hardcoded, so a trainer can add new
// clients without needing a code change. Seeded once with Ed and Tara.
const DEFAULT_PEOPLE = [
  {id:"ed", name:"Ed", role:"client", clientIds:[]},
  {id:"tara", name:"Tara", role:"client", clientIds:[]}
];
let PEOPLE = [];
function peopleDocRef(){ return doc(db, "meta", "people"); }

// A deliberately narrow, public-readable lookup so people can log in with
// either their username or their real email. It contains ONLY email->username
// pairs - no names, roles, or client links - everything else stays behind
// the normal "must be signed in" rule.
function loginLookupDocRef(){ return doc(db, "meta", "login-lookup"); }

async function getUsernameForEmail(email){
  try{
    const snap = await getDoc(loginLookupDocRef());
    const map = (snap.exists() && snap.data().map) ? snap.data().map : {};
    return map[email.trim().toLowerCase()] || null;
  }catch(e){ return null; }
}
async function registerLoginLookup(email, username){
  try{
    const snap = await getDoc(loginLookupDocRef());
    const map = (snap.exists() && snap.data().map) ? snap.data().map : {};
    map[email.trim().toLowerCase()] = username;
    await setDoc(loginLookupDocRef(), {map});
    return true;
  }catch(e){ return false; }
}

async function loadPeople(){
  try{
    const snap = await getDoc(peopleDocRef());
    if(snap.exists() && Array.isArray(snap.data().list) && snap.data().list.length){
      PEOPLE = snap.data().list;
    } else {
      PEOPLE = JSON.parse(JSON.stringify(DEFAULT_PEOPLE));
      await setDoc(peopleDocRef(), {list: PEOPLE});
    }
  }catch(e){
    PEOPLE = JSON.parse(JSON.stringify(DEFAULT_PEOPLE));
  }
}
async function savePeople(){
  try{ await setDoc(peopleDocRef(), {list: PEOPLE}); return true; }catch(e){ return false; }
}

const $ = id => document.getElementById(id);

const fmtDate = iso => new Date(iso).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
const timeAgo = iso => {
  const days = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
  if(days<=0) return "today";
  if(days===1) return "yesterday";
  if(days<14) return `${days} days ago`;
  const weeks = Math.floor(days/7);
  return `${weeks} week${weeks!==1?"s":""} ago`;
};
const lastOf = id => [...LOG].filter(w=>w.sessionId===id).sort((a,b)=>b.date.localeCompare(a.date))[0];

// Local calendar-day string (YYYY-MM-DD), using the browser's local date
// components rather than the UTC date toISOString() would give. Using UTC
// here was the source of a real bug: anyone in a timezone ahead of UTC (UK
// during BST, for instance) would have "today" silently resolve to the UTC
// date, which can be a full day behind local midnight - sessions logged
// today were vanishing from the heatmap entirely. Every day-bucketing
// feature in the app should go through this one function.
function localDayKey(d){
  const dt = (d instanceof Date) ? d : new Date(d);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
}
function dayKey(iso){ return localDayKey(iso); }
function trainedDaysSetFor(log){ return new Set(log.map(w=>dayKey(w.date))); }

function weekStreakFor(log){
  const days = trainedDaysSetFor(log);
  function weekHasSession(weekStart){
    for(let i=0;i<7;i++){
      const d = new Date(weekStart); d.setDate(d.getDate()+i);
      if(days.has(localDayKey(d))) return true;
    }
    return false;
  }
  const now = new Date();
  const dow = (now.getDay()+6)%7; // 0 = Monday
  let weekStart = new Date(now); weekStart.setDate(now.getDate()-dow); weekStart.setHours(0,0,0,0);
  let streak = 0;
  let cursor = new Date(weekStart);
  while(weekHasSession(cursor)){
    streak++;
    cursor.setDate(cursor.getDate()-7);
  }
  return streak;
}

function sessionsInRange(log, startISO, endISO){
  return log.filter(w=>w.date>=startISO && w.date<endISO).length;
}

function buildHeatmap(log){
  const days = trainedDaysSetFor(log);
  const today = new Date(); today.setHours(0,0,0,0);
  const totalDays = 84;
  let start = new Date(today); start.setDate(today.getDate()-totalDays+1);
  const dow = (start.getDay()+6)%7;
  start.setDate(start.getDate()-dow);
  const cells = [];
  let cursor = new Date(start);
  while(cursor<=today){
    const key = localDayKey(cursor);
    cells.push({date:key, trained:days.has(key)});
    cursor.setDate(cursor.getDate()+1);
  }
  const cols = [];
  for(let i=0;i<cells.length;i+=7) cols.push(cells.slice(i,i+7));
  const colsHtml = cols.map(week=>{
    const squares = week.map(c=>`<div class="heat-cell ${c.trained?"on":""}" title="${c.date}"></div>`).join("");
    return `<div class="heat-col">${squares}</div>`;
  }).join("");
  const dayLetters = ["M","T","W","T","F","S","S"];
  const labelsHtml = dayLetters.map(d=>`<div class="heat-daylabel">${d}</div>`).join("");
  return `<div class="heat-outer">
    <div class="heat-daylabels">${labelsHtml}</div>
    <div class="heat-wrap"><div class="heat-grid">${colsHtml}</div></div>
  </div>`;
}

function allTimeBest(exerciseName){
  let best = null;
  LOG.forEach(session=>{
    session.ex.forEach(e=>{
      if(e.n!==exerciseName) return;
      e.sets.forEach(s=>{
        const w = parseFloat(s.w);
        if(isNaN(w)) return;
        const r = parseInt(s.r)||0;
        if(!best || w>best.weight || (w===best.weight && r>best.reps)){
          best = {weight:w, reps:r};
        }
      });
    });
  });
  return best;
}

function showToast(msg, ok=true){
  const t=$("toast");
  t.textContent=msg;
  t.style.background = ok ? "var(--good)" : "#a04030";
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1400);
}

let timerStart=null, timerInterval=null;
function fmtElapsed(ms){ const s=Math.floor(ms/1000); return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`; }
function startTimer(){
  stopTimer(); timerStart=Date.now();
  timerInterval=setInterval(()=>{ const el=$("sessionTimer"); if(!el){stopTimer();return;} el.textContent=fmtElapsed(Date.now()-timerStart); },1000);
}
function stopTimer(){ if(timerInterval){clearInterval(timerInterval); timerInterval=null;} }
function elapsedMinutes(){ return timerStart ? Math.round((Date.now()-timerStart)/60000) : 0; }

let restInterval=null, restRemaining=0;
function fmtRest(sec){ return `${Math.floor(sec/60)}:${String(sec%60).padStart(2,"0")}`; }
function startRest(seconds){
  clearInterval(restInterval);
  restRemaining = seconds;
  renderRest();
  restInterval = setInterval(()=>{
    restRemaining--;
    if(restRemaining<=0){
      clearInterval(restInterval); restInterval=null; restRemaining=0;
      renderRest();
      try{ if(navigator.vibrate) navigator.vibrate([200,100,200]); }catch(e){}
      playBeep();
      showToast("\u23F1 Rest over \u2014 back to it!");
      return;
    }
    renderRest();
  },1000);
}
function cancelRest(){
  clearInterval(restInterval); restInterval=null; restRemaining=0; renderRest();
}
function renderRest(){
  const el = $("restDisplay");
  if(!el) return;
  if(restInterval){
    el.textContent = fmtRest(restRemaining);
    el.classList.add("running");
  } else {
    el.textContent = "Rest";
    el.classList.remove("running");
  }
}
function playBeep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type="sine"; o.frequency.value=880;
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime+0.02);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.5);
    o.stop(ctx.currentTime+0.55);
  }catch(e){}
}

let authMode = "login";
let authError = "";
let signupWho = null; // "ed" | "tara" | "new"
let signupRole = "client";

function renderAuthScreen(){

    const cards = options.map(o=>{

      return `<div class="claim-card ${signupWho===o.id?"active":""}" onclick="setSignupWho('${o.id}')">${av}<div class="claim-name">${o.name}</div></div>`;
    }).join("");
    claimSection = `<div class="auth-field"><label>Who are you?</label><div class="claim-grid">${cards}</div></div>`;
    if(signupWho==="new"){
      extraFields = `

        <div class="auth-field"><label>Role</label><div class="seg">
          <button class="${signupRole==="client"?"active":""}" onclick="setSignupRole('client')">Client</button>
          <button class="${signupRole==="trainer"?"active":""}" onclick="setSignupRole('trainer')">Trainer</button>
        </div></div>`;
    }
  }

  app.innerHTML = `
    <div class="auth-wrap">
      <div class="auth-title">
        <div class="kicker">MK1 Gym &middot; Selby</div>
        <h1>Workout Tracker</h1>
      </div>
      ${tabs}
      ${errorHtml}
      ${claimSection}
      <div class="auth-field"><label>${isLogin?"Username or email":"Username"}</label><input type="text" id="authUsername" autocomplete="username" placeholder="${isLogin?"e.g. ed or ed@example.com":"e.g. ed"}"></div>
      ${!isLogin ? `<div class="auth-field"><label>Email address</label><input type="email" id="authEmail" autocomplete="email" placeholder="you@example.com"></div>` : ""}
      <div class="auth-field"><label>Password</label><input type="password" id="authPassword" autocomplete="${isLogin?"current-password":"new-password"}" placeholder="********"></div>
      ${!isLogin ? `<div class="auth-field"><label>Confirm password</label><input type="password" id="authPassword2" autocomplete="new-password" placeholder="********"></div>` : ""}
      ${extraFields}
      <button class="auth-btn" onclick="submitAuth()">${isLogin?"Log in":"Create account"}</button>
    </div>`;
  window.scrollTo(0,0);

function setAuthMode(mode){ authMode=mode; authError=""; renderAuthScreen(); }
function setSignupWho(id){ signupWho=id; renderAuthScreen(); }
function setSignupRole(role){ signupRole=role; renderAuthScreen(); }

function uniquePersonId(name){
  const base = slugify(name);
  let id = base, n = 2;
  while(PEOPLE.some(p=>p.id===id)){ id = `${base}-${n}`; n++; }
  return id;
}

async function submitAuth(){
  const input = ($("authUsername").value||"").trim();
  const password = $("authPassword").value||"";
  if(!input || !password){ authError="Enter your username/email and password."; renderAuthScreen(); return; }

  if(authMode==="login"){
    let loginUsername = input;
    if(input.includes("@")){
      const found = await getUsernameForEmail(input);
      if(!found){
        authError = "No account found for that email.";
        renderAuthScreen();
        return;
      }
      loginUsername = found;
    }
    try{
      await signInWithEmailAndPassword(auth, usernameToEmail(loginUsername), password);
    }catch(e){
      authError = "Couldn't log in. Check your username/email and password.";
      renderAuthScreen();
    }
    return;
  }

  // signup
  const username = input;
  const authEmail = usernameToEmail(username);
  const password2 = $("authPassword2") ? $("authPassword2").value : "";
  const realEmail = ($("authEmail")?.value||"").trim();
  if(!realEmail || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(realEmail)){
    authError = "Enter a valid email address.";
    renderAuthScreen();
    return;
  }
  if(password.length<6){ authError="Password needs to be at least 6 characters."; renderAuthScreen(); return; }
  if(password!==password2){ authError="Passwords don't match."; renderAuthScreen(); return; }
  if(!signupWho){ authError="Choose who you are first."; renderAuthScreen(); return; }

  await loadPeople();
  let profileId, displayName, role;
  if(signupWho==="new"){
    displayName = ($("authDisplayName")?.value||"").trim();
    if(!displayName){ authError="Enter your name."; renderAuthScreen(); return; }
    role = signupRole || "client";
    profileId = uniquePersonId(displayName);
  } else {
    profileId = signupWho;
    displayName = signupWho==="ed" ? "Ed" : "Tara";
    role = "client";
  }

  try{
    const cred = await createUserWithEmailAndPassword(auth, authEmail, password);
    await setDoc(doc(db,"users",cred.user.uid), {profileId});
    const existing = PEOPLE.find(p=>p.id===profileId);
    if(existing){ existing.uid = cred.user.uid; existing.email = realEmail; existing.username = username; }
    else{ PEOPLE.push({id:profileId, name:displayName, role, clientIds:[], uid:cred.user.uid, email:realEmail, username}); }
    await savePeople();
    await registerLoginLookup(realEmail, username);
  }catch(e){
    authError = (e && e.code==="auth/email-already-in-use") ? "That username is already taken." : "Couldn't create that account.";
    renderAuthScreen();
  }
}

function logOut(){
  cancelHiit(); cancelRest(); stopTimer();

}

function openSession(id){
  const p = PLAN.find(x=>x.id===id);
  const last = lastOf(id);
  const blocks = p.ex.map((e,i)=>{
    const prev = last && last.ex.find(le=>le.n===e.n);
    const prevHtml = (prev && prev.sets.length)
      ? `Last: <b>${prev.sets.map(s=>`${s.w||"?"}kg&times;${s.r||"?"}`).join(" &nbsp;\u00b7&nbsp; ")}</b>`
      : "First time logging this exercise";
    const priorBest = allTimeBest(e.n);
    const bestHtml = priorBest ? ` &nbsp;&middot;&nbsp; &#127942; PR: <b>${priorBest.weight}kg&times;${priorBest.reps}</b>` : "";
    const rows = Array.from({length:e.s},(_,si)=>{
      const pw = prev&&prev.sets[si] ? prev.sets[si].w : "";
      const pr = prev&&prev.sets[si] ? prev.sets[si].r : "";
      return makeSetRow(si,pw,pr);
    }).join("");
    return `<div class="ex" id="ex${i}">
      ${EXERCISE_IMAGES[e.n] ? `<img class="ex-thumb" src="${EXERCISE_IMAGES[e.n]}" alt="${e.n}">` : ""}
      <div class="ex-head"><div class="ex-name">${i+1}. ${e.n}</div><div class="scheme">${e.s}&times;${e.r}</div></div>
      ${e.note ? `<div class="ex-note">${e.note}</div>` : ""}
      <div class="prev">${prevHtml}${bestHtml}</div>
      <div class="sets" id="sets${i}">${rows}</div>
      <button class="addset-btn" onclick="addSet(${i},event)">+ add set</button>
    </div>`;
  }).join("");

  const footer = last
    ? `<div class="last-updated">Last workout: <b>${fmtDate(last.date)}</b> &middot; ${timeAgo(last.date)}</div>`
    : `<div class="last-updated">No previous workout logged for this session yet</div>`;

  app.innerHTML = `
    <div class="topbar">
      <button class="back" onclick="home()">&#8592; Back</button>
      <div class="topbar-info"><h2>${p.name}</h2><div class="focus">${p.focus}</div></div>

    </div>

  window.scrollTo(0,0);
  startTimer();
}

function makeSetRow(si, pw, pr){
  return `<div class="setrow" data-pw="${pw}" data-pr="${pr}">
    <div class="setn">S${si+1}</div>
    <div class="field">
      <input type="number" inputmode="decimal" step="0.5" min="0" class="w-input" placeholder="${pw!==''?pw+' kg':'kg'}" oninput="updateSetIndicator(this)">
      <span class="trend-ind"></span>
    </div>
    <div class="field">
      <input type="number" inputmode="numeric" min="0" class="r-input" placeholder="${pr!==''?pr+' reps':'reps'}" oninput="updateSetIndicator(this)">
      <span class="trend-ind"></span>
    </div>
    <button class="tick" onclick="tick(this)">&#10003;</button>
    <button class="remove-set" onclick="removeSet(this)" aria-label="Remove set">&times;</button>
  </div>`;
}
function renumber(setsEl){ [...setsEl.children].forEach((row,idx)=>{ row.querySelector(".setn").textContent="S"+(idx+1); }); }

function updateSetIndicator(inputEl){
  const row = inputEl.closest(".setrow");
  const indicator = inputEl.parentElement.querySelector(".trend-ind");
  if(!row || !indicator) return;
  const isWeight = inputEl.classList.contains("w-input");
  const prevRaw = isWeight ? row.dataset.pw : row.dataset.pr;
  const prev = prevRaw!=="" ? parseFloat(prevRaw) : null;
  const curRaw = inputEl.value.trim();
  const cur = curRaw!=="" ? parseFloat(curRaw) : null;
  if(prev===null || cur===null || isNaN(prev) || isNaN(cur)){
    indicator.className = "trend-ind";
    indicator.innerHTML = "";
    return;
  }
  if(cur>prev){ indicator.className="trend-ind up"; indicator.innerHTML="&#9650;"; }
  else if(cur<prev){ indicator.className="trend-ind down"; indicator.innerHTML="&#9660;"; }
  else { indicator.className="trend-ind same"; indicator.innerHTML="&#8212;"; }
}

function tick(btn){
  const row = btn.closest(".setrow");
  const w = row.querySelector(".w-input"), r = row.querySelector(".r-input");
  const pw = row.dataset.pw, pr = row.dataset.pr;
  if(!btn.classList.contains("on")){
    if(!w.value && pw!=="") w.value = pw;
    if(!r.value && pr!=="") r.value = pr;
    btn.classList.add("on");
  } else btn.classList.remove("on");
  updateSetIndicator(w);
  updateSetIndicator(r);
  checkDone(btn.closest(".ex"));
}
function checkDone(exEl){
  if(!exEl) return;
  const ticks = exEl.querySelectorAll(".tick"), on = exEl.querySelectorAll(".tick.on");
  exEl.classList.toggle("done", ticks.length>0 && ticks.length===on.length);
}
function addSet(ei, e){
  e.preventDefault();
  const c=$("sets"+ei);
  c.insertAdjacentHTML("beforeend", makeSetRow(c.children.length, "", ""));
}
function removeSet(btn){
  const row = btn.closest(".setrow"), setsEl = row.closest(".sets"), exEl = btn.closest(".ex");
  if(setsEl.children.length<=1){ showToast("Keep at least one set", false); return; }
  row.remove(); renumber(setsEl); checkDone(exEl);
}

async function saveSession(id){
  const p = PLAN.find(x=>x.id===id);
  const ex = p.ex.map((e,i)=>{
    const c=$("sets"+i); const sets=[];
    [...c.children].forEach(row=>{
      const w=row.querySelector(".w-input").value.trim();
      const r=row.querySelector(".r-input").value.trim();
      if(w||r) sets.push({w:w?parseFloat(w):"", r:r?parseInt(r):""});
    });
    return {n:e.n, sets};
  }).filter(e=>e.sets.length);

  if(!ex.length){ showToast("Log at least one set first", false); return; }

  // Spot new personal records before this session is added to history
  const prHits = [];
  ex.forEach(e=>{
    const priorBest = allTimeBest(e.n);
    let sessionMax = null;
    e.sets.forEach(s=>{
      const w = parseFloat(s.w);
      if(isNaN(w)) return;
      if(!sessionMax || w>sessionMax) sessionMax = w;
    });
    if(sessionMax!==null && (!priorBest || sessionMax>priorBest.weight)){
      prHits.push(`${e.n.split("(")[0].trim()} ${sessionMax}kg`);
    }
  });

  const duration = elapsedMinutes();
  LOG.push({sessionId:id, date:new Date().toISOString(), duration, ex});
  const ok = await saveLog();
  stopTimer();
  cancelRest();
  if(!ok){
    showToast("Couldn't save \u2014 check your connection");
    LOG.pop(); // don't keep an unsaved entry in memory if the write failed
    setTimeout(home, 1000);
  } else {
    if(prHits.length){
      showToast(`\u{1F3C6} New PR: ${prHits.slice(0,2).join(", ")}${prHits.length>2?` +${prHits.length-2} more`:""}`);
    } else {
      showToast("Session saved & synced \u2713");
    }
    setTimeout(()=>showPostSessionSummary(ex, prHits), 1200);
  }
}

    return;
  }
  const sorted = [...LOG].map((w,i)=>({...w,_i:i})).sort((a,b)=>b.date.localeCompare(a.date));

// ── Body weight tracker ──────────────────────────────────
function sortedWeights(){ return [...WEIGHTS].sort((a,b)=>a.date.localeCompare(b.date)); }

function changeSince(sorted, days, key="weight"){
  if(sorted.length<2) return null;
  const last = sorted[sorted.length-1];
  const cutoff = new Date(last.date).getTime() - days*86400000;
  let ref = null;
  for(const w of sorted){ if(new Date(w.date).getTime() <= cutoff) ref = w; }
  if(!ref || ref===last) return null;
  return last[key] - ref[key];
}

function deltaHtml(delta, decimals=1){
  if(delta===null || delta===undefined) return `<span class="value flat">&mdash;</span>`;
  const cls = delta>0.05 ? "up" : delta<-0.05 ? "down" : "flat";
  const arrow = delta>0.05 ? "&#9650;" : delta<-0.05 ? "&#9660;" : "&#8212;";
  return `<span class="value ${cls}">${arrow} ${Math.abs(delta).toFixed(decimals)}kg</span>`;
}

// ── Bar charts (dashboard) ────────────────────────────────
function buildBarChartSVG(items, opts={}){
  const color = opts.color || "var(--accent)";
  const labelEvery = opts.labelEvery || 1;
  const unit = opts.unit || "";
  const showValues = opts.showValues!==false;
  const W=560, H=190, padL=26, padR=10, padT=18, padB=30;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const maxV = Math.max(...items.map(i=>i.value), 1);
  const n = items.length;
  const slot = plotW/n;
  const barW = Math.max(slot*0.55, 3);
  const bars = items.map((it,i)=>{
    const h = (it.value/maxV)*plotH;
    const x = padL + slot*i + (slot-barW)/2;
    const y = padT + plotH - h;
    const showLabel = (i % labelEvery === 0) || i===n-1;
    const valueLabel = (showValues && it.value>0) ? `<text x="${(x+barW/2).toFixed(1)}" y="${(y-4).toFixed(1)}" fill="var(--mute)" font-size="9" text-anchor="middle">${it.value}${unit}</text>` : "";
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(h,1).toFixed(1)}" rx="3" fill="${color}"/>
      ${valueLabel}
      ${showLabel ? `<text x="${(x+barW/2).toFixed(1)}" y="${H-8}" fill="var(--mute)" font-size="9" text-anchor="middle">${it.label}</text>` : ""}`;
  }).join("");
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <line x1="${padL}" y1="${padT+plotH}" x2="${W-padR}" y2="${padT+plotH}" stroke="var(--line)" stroke-width="1"/>
    ${bars}
  </svg>`;
}

function buildStackedBarChartSVG(items, seriesKeys, colors, opts={}){
  const showValues = opts.showValues!==false;
  const labelEvery = opts.labelEvery || 1;
  const W=560, H=190, padL=26, padR=10, padT=18, padB=30;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const totals = items.map(it => seriesKeys.reduce((s,k)=>s+(it[k]||0),0));
  const maxV = Math.max(...totals, 1);
  const n = items.length;
  const slot = plotW/n;
  const barW = Math.max(slot*0.55, 3);
  const bars = items.map((it,i)=>{
    const x = padL + slot*i + (slot-barW)/2;
    let cursorY = padT + plotH;
    let segs = "";
    seriesKeys.forEach(k=>{
      const v = it[k]||0;
      const h = (v/maxV)*plotH;
      cursorY -= h;
      if(v>0) segs += `<rect x="${x.toFixed(1)}" y="${cursorY.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(h,1).toFixed(1)}" fill="${colors[k]}"/>`;
    });
    const total = totals[i];
    const totalLabel = (showValues && total>0) ? `<text x="${(x+barW/2).toFixed(1)}" y="${(cursorY-4).toFixed(1)}" fill="var(--mute)" font-size="9" text-anchor="middle">${total}</text>` : "";
    const showLabel = (i % labelEvery === 0) || i===n-1;
    return `${segs}${totalLabel}${showLabel ? `<text x="${(x+barW/2).toFixed(1)}" y="${H-8}" fill="var(--mute)" font-size="9" text-anchor="middle">${it.label}</text>` : ""}`;
  }).join("");
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <line x1="${padL}" y1="${padT+plotH}" x2="${W-padR}" y2="${padT+plotH}" stroke="var(--line)" stroke-width="1"/>
    ${bars}
  </svg>`;
}

function dailyVisitBuckets(log, daysBack){
  const today = new Date(); today.setHours(0,0,0,0);
  const days = [];
  for(let i=daysBack-1;i>=0;i--){
    const d = new Date(today); d.setDate(today.getDate()-i);
    const key = localDayKey(d);
    const inDay = log.filter(s=>localDayKey(s.date)===key);
    const label = daysBack<=7 ? d.toLocaleDateString("en-GB",{weekday:"short"}) : String(d.getDate());
    days.push({label, value:inDay.length, gym:inDay.filter(s=>!s.hiit).length, hiit:inDay.filter(s=>s.hiit).length});
  }
  return days;
}

function dailyMinutesBuckets(log, daysBack){
  const today = new Date(); today.setHours(0,0,0,0);
  const days = [];
  for(let i=daysBack-1;i>=0;i--){
    const d = new Date(today); d.setDate(today.getDate()-i);
    const key = localDayKey(d);
    const mins = log.filter(s=>localDayKey(s.date)===key).reduce((sum,s)=>sum+(s.duration||0),0);
    const label = daysBack<=7 ? d.toLocaleDateString("en-GB",{weekday:"short"}) : String(d.getDate());
    days.push({label, value:mins});
  }
  return days;
}

function buildTrendChartSVG(pairs){
  if(pairs.length<2){
    return `<div class="chart-empty">Log at least two entries to see a trend line here.</div>`;
  }
  const W=560, H=200, padL=38, padR=12, padT=16, padB=24;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const times = pairs.map(w=>new Date(w.date).getTime());
  const vals = pairs.map(w=>w.value);
  const minT=Math.min(...times), maxT=Math.max(...times);
  const minW=Math.min(...vals), maxW=Math.max(...vals);
  const range = Math.max(maxW-minW, 0.5);
  const pad = Math.max(range*0.2, 0.5);
  const loY = minW-pad, hiY = maxW+pad;
  const x = t => padL + (maxT>minT ? (t-minT)/(maxT-minT) : 0.5) * plotW;
  const y = v => padT + plotH - (v-loY)/(hiY-loY) * plotH;
  const pts = pairs.map((w,i)=>[x(times[i]), y(w.value)]);
  const lineD = pts.map((p,i)=>(i===0?"M":"L")+p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  const areaD = lineD + ` L${pts[pts.length-1][0].toFixed(1)},${(padT+plotH).toFixed(1)} L${pts[0][0].toFixed(1)},${(padT+plotH).toFixed(1)} Z`;
  const circles = pts.map((p,i)=>{
    const last = i===pts.length-1;
    return `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${last?5:3}" fill="${last?"var(--accent)":"var(--good)"}" stroke="${"#15181f"}" stroke-width="1.5"/>`;
  }).join("");
  const gridY = [loY, (loY+hiY)/2, hiY];
  const gridlines = gridY.map(v=>{
    const yy=y(v).toFixed(1);
    return `<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="var(--line)" stroke-width="1"/>
      <text x="${padL-6}" y="${yy}" fill="var(--mute)" font-size="10" text-anchor="end" dominant-baseline="middle">${v.toFixed(1)}</text>`;
  }).join("");
  const firstLabel = fmtDate(pairs[0].date);
  const lastLabel = fmtDate(pairs[pairs.length-1].date);
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    ${gridlines}
    <path d="${areaD}" fill="var(--accent)" opacity="0.12"/>
    <path d="${lineD}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${circles}
    <text x="${padL}" y="${H-6}" fill="var(--mute)" font-size="10">${firstLabel}</text>
    <text x="${W-padR}" y="${H-6}" fill="var(--mute)" font-size="10" text-anchor="end">${lastLabel}</text>
  </svg>`;
}
function buildWeightChartSVG(sorted){
  return buildTrendChartSVG(sorted.map(w=>({date:w.date, value:w.weight})));
}

async function saveWeightEntry(){
  const dateVal = $("wDate").value;
  const wVal = parseFloat($("wVal").value);
  if(!dateVal || !wVal || wVal<=0){ showToast("Enter a date and weight", false); return; }
  const iso = new Date(dateVal+"T12:00:00").toISOString();
  // replace any existing entry for the same day rather than duplicating
  WEIGHTS = WEIGHTS.filter(w=>w.date.slice(0,10)!==iso.slice(0,10));
  WEIGHTS.push({date: iso, weight: Math.round(wVal*10)/10});
  const ok = await saveLog();
  showToast(ok ? "Weight saved & synced \u2713" : "Couldn't save \u2014 check your connection");
  showWeightTracker();
}

async function deleteWeightEntry(idx){
  if(!confirm("Remove this weight entry?")) return;
  WEIGHTS.splice(idx,1);
  await saveLog();
  showWeightTracker();
}

async function saveMeasurementEntry(){
  const dateVal = $("mDate").value;
  const waist = parseFloat($("mWaist").value);
  const chest = parseFloat($("mChest").value);
  const arms = parseFloat($("mArms").value);
  if(!dateVal || (isNaN(waist) && isNaN(chest) && isNaN(arms))){
    showToast("Enter a date and at least one measurement", false);
    return;
  }
  const iso = new Date(dateVal+"T12:00:00").toISOString();
  const dayStr = iso.slice(0,10);
  let entry = MEASUREMENTS.find(e=>e.date.slice(0,10)===dayStr);
  if(!entry){ entry = {date: iso}; MEASUREMENTS.push(entry); }
  if(!isNaN(waist)) entry.waist = Math.round(waist*10)/10;
  if(!isNaN(chest)) entry.chest = Math.round(chest*10)/10;
  if(!isNaN(arms)) entry.arms = Math.round(arms*10)/10;
  const ok = await saveLog();
  showToast(ok ? "Measurements saved & synced \u2713" : "Couldn't save \u2014 check your connection");
  showMeasurements();
}

async function deleteMeasurementEntry(idx){
  if(!confirm("Remove this measurement entry?")) return;
  MEASUREMENTS.splice(idx,1);
  await saveLog();
  showMeasurements();
}

function slugify(name){
  return name.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"") || "session";
}
function uniqueSessionId(name){
  const base = slugify(name);
  let id = base, n = 2;
  while(PLAN.some(p=>p.id===id)){ id = `${base}-${n}`; n++; }
  return id;
}

// ── HIIT class runner (countdown engine) ──────────────────
let hiitState = null;
let hiitInterval = null;

function cancelHiit(){
  if(hiitInterval){ clearInterval(hiitInterval); hiitInterval=null; }
  if(hiitState) hiitState.running=false;
}

function openHiitRunner(id){
  stopTimer(); cancelRest();
  const cls = HIIT_CLASSES.find(c=>c.id===id);
  if(!cls || !cls.ex.length){ showToast("Couldn't open that class", false); return; }
  hiitState = {
    cls,
    phase: "work",
    exIndex: 0,
    round: 1,
    remaining: cls.format==="interval" ? cls.workSec : cls.format==="amrap" ? cls.capMin*60 : cls.intervalSec,
    elapsedSec: 0,
    running: false,
    roundsCompleted: 0,
    done: false
  };
  renderHiitRunner();
}

function cueBeep(){
  try{ if(navigator.vibrate) navigator.vibrate(150); }catch(e){}
  playBeep();
}

function advanceHiitExercise(){
  cueBeep();
  hiitState.exIndex++;
  if(hiitState.exIndex>=hiitState.cls.ex.length){
    hiitState.exIndex=0;
    hiitState.round++;
    if(hiitState.round>hiitState.cls.rounds){ finishHiit(); return; }
    if(hiitState.cls.roundRestEnabled && hiitState.cls.roundRestSec>0){
      hiitState.phase="roundrest";
      hiitState.remaining=hiitState.cls.roundRestSec;
      return;
    }
  }
  hiitState.phase="work";
  hiitState.remaining = hiitState.cls.format==="interval" ? hiitState.cls.workSec : hiitState.cls.intervalSec;
}

function handlePhaseEnd(){
  const cls = hiitState.cls;
  if(cls.format==="amrap"){ finishHiit(); return; }
  if(hiitState.phase==="roundrest"){
    cueBeep();
    hiitState.phase="work";
    hiitState.remaining = cls.format==="interval" ? cls.workSec : cls.intervalSec;
    return;
  }
  if(cls.format==="interval"){
    if(hiitState.phase==="work"){
      cueBeep();
      hiitState.phase="rest";
      hiitState.remaining=cls.restSec;
      if(cls.restSec<=0) advanceHiitExercise();
    } else {
      advanceHiitExercise();
    }
  } else {
    advanceHiitExercise();
  }
}

function tickHiit(){
  if(!hiitState || hiitState.done) return;
  hiitState.elapsedSec++;
  hiitState.remaining--;
  if(hiitState.remaining<=0) handlePhaseEnd();
  renderHiitRunner();
}

function finishHiit(){
  if(hiitInterval){ clearInterval(hiitInterval); hiitInterval=null; }
  hiitState.running=false;
  hiitState.done=true;
  try{ if(navigator.vibrate) navigator.vibrate([200,100,200,100,200]); }catch(e){}
  playBeep();
  const durationMin = Math.max(1, Math.round(hiitState.elapsedSec/60));
  LOG.push({sessionId:`hiit-${hiitState.cls.id}`, date:new Date().toISOString(), duration:durationMin, ex:[], hiit:true, hiitName:hiitState.cls.name});
  saveLog().then(ok=>{ showToast(ok ? "Class complete! Logged \u2713" : "Class complete (sync failed)"); });
}

function toggleHiitTimer(){
  if(hiitState.done) return;
  if(hiitState.running){
    clearInterval(hiitInterval); hiitInterval=null; hiitState.running=false;
  } else {
    hiitState.running=true;
    hiitInterval = setInterval(tickHiit, 1000);
  }
  renderHiitRunner();
}
function skipHiitPhase(){
  handlePhaseEnd();
  renderHiitRunner();
}
function finishHiitEarly(){
  if(!confirm("Finish this class now? It'll be logged with the time you've done so far.")) return;
  finishHiit();
  renderHiitRunner();
}
function incrementAmrapRound(){
  hiitState.roundsCompleted++;
  renderHiitRunner();
}

function renderHiitRunner(){
  const s = hiitState, cls = s.cls;

  if(s.done){
    app.innerHTML = `
      <div class="topbar">
        <button class="back" onclick="home()">&#8592; Back</button>
        <div class="topbar-info"><h2>${cls.name}</h2><div class="focus">Complete</div></div>
      </div>
      <div class="streak-hero">
        <div class="num">&#10003;</div>
        <div class="lbl">Class complete &mdash; logged to your activity</div>
      </div>
      <div class="last-updated">${Math.max(1,Math.round(s.elapsedSec/60))} min &middot; ${cls.ex.length} exercises</div>
      <div class="savebar"><div class="inner"><button class="save-btn" onclick="home()">Done</button></div></div>
    `;
    return;
  }

  const exName = cls.ex[s.exIndex % cls.ex.length].n;
  let phaseLabel, phaseClass;
  if(cls.format==="amrap"){ phaseLabel="AMRAP"; phaseClass="amrap"; }
  else if(s.phase==="roundrest"){ phaseLabel="ROUND REST"; phaseClass="rest"; }
  else if(cls.format==="emom"){ phaseLabel="EMOM"; phaseClass="work"; }
  else { phaseLabel = s.phase==="work" ? "WORK" : "REST"; phaseClass = s.phase; }
  const exNameLabel = s.phase==="roundrest" ? `Up next: ${exName}` : exName;

  const progressLabel = cls.format==="amrap"
    ? `Rounds completed: ${s.roundsCompleted}`
    : `Round ${Math.min(s.round,cls.rounds)} of ${cls.rounds} &middot; Exercise ${(s.exIndex%cls.ex.length)+1} of ${cls.ex.length}`;

  const exList = cls.ex.map((e,i)=>{
    const active = cls.format!=="amrap" && i===(s.exIndex%cls.ex.length);
    return `<div class="hiit-ex-row${active?" active":""}"><div class="hx-name">${i+1}. ${e.n}</div></div>`;
  }).join("");

  const amrapBtn = cls.format==="amrap"
    ? `<button class="rest-chip" style="width:100%;margin-bottom:14px" onclick="incrementAmrapRound()">+1 round (currently ${s.roundsCompleted})</button>`
    : "";

  app.innerHTML = `
    <div class="topbar">
      <button class="back" onclick="home()">&#8592; Back</button>
      <div class="topbar-info"><h2>${cls.name}</h2><div class="focus">${progressLabel}</div></div>
    </div>
    <div class="hiit-timer-card ${phaseClass}">
      <div class="hiit-phase">${phaseLabel}</div>
      <div class="hiit-countdown">${fmtRest(Math.max(0,s.remaining))}</div>
      <div class="hiit-exname">${exNameLabel}</div>
    </div>
    ${amrapBtn}
    <div class="hiit-controls">
      <button class="hiit-ctrl-btn primary" onclick="toggleHiitTimer()">${s.running?"Pause":"Start"}</button>
      <button class="hiit-ctrl-btn" onclick="skipHiitPhase()">Skip</button>
      <button class="hiit-ctrl-btn" onclick="finishHiitEarly()">Finish</button>
    </div>
    <div class="section-label">Exercises</div>
    ${exList}
  `;
}

function startOfWeekISO(){
  const now = new Date(); const dow=(now.getDay()+6)%7;
  const d = new Date(now); d.setDate(now.getDate()-dow); d.setHours(0,0,0,0);
  return d.toISOString();
}
function startOfMonthISO(){
  const now = new Date();
  return new Date(now.getFullYear(), now.getMonth(), 1, 0,0,0,0).toISOString();
}

async function saveAccountEmail(){
  const val = ($("accountEmail").value||"").trim();
  const usernameVal = ($("accountUsername").value||"").trim();
  if(!val || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val)){
    showToast("Enter a valid email address", false);
    return;
  }
  if(!usernameVal){
    showToast("Enter your username", false);
    return;
  }
  await loadPeople();
  const p = PEOPLE.find(x=>x.id===CURRENT_PROFILE.id);
  const usernameChanged = p && p.username && p.username!==usernameVal;

  // Changing the username here must also change the real Firebase Auth
  // credential, or the field would just be a label that drifts out of sync
  // with what actually has to be typed to log in.
  if(usernameChanged && auth.currentUser){
    try{
      await updateEmail(auth.currentUser, usernameToEmail(usernameVal));
    }catch(e){
      const msg = (e && e.code==="auth/requires-recent-login")
        ? "For security, log out and back in, then try changing your username again."
        : "Couldn't update your login \u2014 username unchanged.";
      showToast(msg, false);
      return;
    }
  }

  if(p){
    p.username = usernameVal;
    p.email = val;
    CURRENT_PROFILE.email = val;
    CURRENT_PROFILE.username = usernameVal;
  }
  const ok = await savePeople();
  if(ok && p) await registerLoginLookup(val, usernameVal);
  showToast(ok ? "Saved \u2713" : "Couldn't save \u2014 check your connection");
}

// ── Profile photo upload (resize + center-crop + compress client-side,
// since there's no backend to do it for us; keeps each photo small enough
// that storing it directly on the shared people-directory document stays
// well within Firestore's per-document size limit) ──────────────────────
function triggerPhotoUpload(){
  const input = $("photoFileInput");
  if(input) input.click();
}

function processImageFile(file){
  return new Promise((resolve, reject)=>{
    if(!file.type || !file.type.startsWith("image/")){
      reject(new Error("not an image"));
      return;
    }
    const reader = new FileReader();
    reader.onload = (e)=>{
      const img = new Image();
      img.onload = ()=>{
        const size = 200;
        const canvas = document.createElement("canvas");
        canvas.width = size; canvas.height = size;
        const ctx = canvas.getContext("2d");
        const minSide = Math.min(img.width, img.height);
        const sx = (img.width-minSide)/2, sy = (img.height-minSide)/2;
        ctx.drawImage(img, sx, sy, minSide, minSide, 0, 0, size, size);
        resolve(canvas.toDataURL("image/jpeg", 0.8));
      };
      img.onerror = ()=>reject(new Error("couldn't read that image"));
      img.src = e.target.result;
    };
    reader.onerror = ()=>reject(new Error("couldn't read that file"));
    reader.readAsDataURL(file);
  });
}

async function handlePhotoFileSelected(event){
  const file = event.target.files && event.target.files[0];
  event.target.value = "";
  if(!file) return;
  if(file.size > 12*1024*1024){
    showToast("That image is too large \u2014 try a smaller one", false);
    return;
  }
  showToast("Processing photo\u2026");
  try{
    const dataUrl = await processImageFile(file);
    const p = PEOPLE.find(x=>x.id===CURRENT_PROFILE.id);
    if(p){ p.photo = dataUrl; CURRENT_PROFILE.photo = dataUrl; }
    const ok = await savePeople();
    showToast(ok ? "Photo updated \u2713" : "Couldn't save \u2014 check your connection");
    showAccountSettings();
  }catch(e){
    showToast("Couldn't process that image", false);
  }
}

async function removeProfilePhoto(){
  if(!confirm("Remove your profile photo?")) return;
  const p = PEOPLE.find(x=>x.id===CURRENT_PROFILE.id);
  if(p){ delete p.photo; delete CURRENT_PROFILE.photo; }
  const ok = await savePeople();
  showToast(ok ? "Photo removed" : "Couldn't save \u2014 check your connection");

function setTrainerDraftFocus(v){ trainerDraftSession.focus = v; }

function setTrainerDraftExReps(i,v){ trainerDraftSession.ex[i].r = v; }
function setTrainerDraftExNote(i,v){ trainerDraftSession.ex[i].note = v; }

function addTrainerDraftExercise(){
  const sel = $("trainerExercisePicker");
  if(!sel || !sel.value) return;
  trainerDraftSession.ex.push({n:sel.value, s:3, r:"10-12", note:""});
  renderTrainerSessionEditor();
}
function removeTrainerDraftExercise(idx){
  trainerDraftSession.ex.splice(idx,1);
  renderTrainerSessionEditor();
}
function moveTrainerDraftExercise(idx, dir){
  const newIdx = idx + dir;
  if(newIdx<0 || newIdx>=trainerDraftSession.ex.length) return;
  const arr = trainerDraftSession.ex;
  [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
  renderTrainerSessionEditor();
}

function uniqueTrainerSessionId(name){
  const base = slugify(name);
  let id = base, n = 2;
  while(trainerClientPlan.some(p=>p.id===id)){ id = `${base}-${n}`; n++; }
  return id;
}

async function saveTrainerClientPlan(){
  try{
    // merge:true is essential here - it touches ONLY the plan field on the
    // client's document, leaving their log/weights/measurements untouched.
    await setDoc(doc(db, "trackers", `${TRACKER_ID}-${trainerClientId}`), {plan: trainerClientPlan}, {merge:true});
    return true;
  }catch(e){ return false; }
}

async function saveTrainerDraftSession(){
  const name = (trainerDraftSession.name||"").trim();
  const focus = (trainerDraftSession.focus||"").trim();
  if(!name){ showToast("Give the session a name", false); return; }
  if(!trainerDraftSession.ex.length){ showToast("Add at least one exercise", false); return; }
  if(!trainerDraftSession.id){
    trainerDraftSession.id = uniqueTrainerSessionId(name);
    trainerClientPlan.push({id:trainerDraftSession.id, name, focus, ex:trainerDraftSession.ex});
  } else {
    const idx = trainerClientPlan.findIndex(p=>p.id===trainerDraftSession.id);
    const updated = {id:trainerDraftSession.id, name, focus, ex:trainerDraftSession.ex};
    if(idx>=0) trainerClientPlan[idx] = updated; else trainerClientPlan.push(updated);
  }
  const ok = await saveTrainerClientPlan();
  showToast(ok ? "Session saved & synced \u2713" : "Couldn't save \u2014 check your connection");
  renderTrainerClientSessions();
}

async function deleteTrainerClientSession(id){
  if(!confirm("Delete this session? The client's past history logged under it stays in their records.")) return;
  trainerClientPlan = trainerClientPlan.filter(p=>p.id!==id);
  await saveTrainerClientPlan();
  renderTrainerClientSessions();
}

function computeMuscleSets(logEntries){
  const totals = {};
  MUSCLE_GROUPS.forEach(g=>totals[g]=0);
  logEntries.forEach(session=>{
    (session.ex||[]).forEach(e=>{
      const group = EXERCISE_MUSCLE_MAP[e.n];
      if(group) totals[group] += (e.sets||[]).length;
    });
  });
  return totals;
}

function heatColor(sets, cap){
  if(sets<=0) return "#2a3144";
  const t = Math.min(sets/Math.max(cap,1), 1);
  const cold=[58,70,92], hot=[226,80,42];
  const r = Math.round(cold[0]+(hot[0]-cold[0])*t);
  const g = Math.round(cold[1]+(hot[1]-cold[1])*t);
  const b = Math.round(cold[2]+(hot[2]-cold[2])*t);
  return `rgb(${r},${g},${b})`;
}

];

function muscleStatsRows(totals){
  const sections = MUSCLE_SECTIONS.map(sec=>{
    const rows = sec.groups
      .map(g=>({name:g.charAt(0).toUpperCase()+g.slice(1), count:totals[g]||0}))
      .filter(r=>r.count>0)
      .sort((a,b)=>b.count-a.count);
    const total = rows.reduce((s,r)=>s+r.count,0);
    return {label:sec.label, total, rows};
  }).filter(sec=>sec.total>0)
    .sort((a,b)=>b.total-a.total);

  if(!sections.length){
    return `<div class="chart-empty">No muscle groups logged yet.</div>`;
  }

  return sections.map(sec=>{
    const rowsHtml = sec.rows.map(r=>
      `<div class="hrow"><div class="hn">${r.name}</div><div class="hv">${r.count} set${r.count!==1?"s":""}</div></div>`
    ).join("");
    return `<div class="section-label" style="margin:14px 0 6px">${sec.label} &middot; ${sec.total} set${sec.total!==1?"s":""}</div>
      <div class="hday">${rowsHtml}</div>`;
  }).join("");
}

// Six broad categories for the radar chart (Biceps/Triceps combined into
// "Arms" here specifically, unlike the more granular MUSCLE_SECTIONS used
// elsewhere - matches how most fitness apps present a distribution chart).
const RADAR_CATEGORIES = [
  {label:"Chest", groups:["chest"]},
  {label:"Shoulders", groups:["shoulders"]},
  {label:"Arms", groups:["biceps","triceps"]},
  {label:"Legs", groups:["quads","hamstrings","glutes","calves"]},
  {label:"Core", groups:["abs"]},
  {label:"Back", groups:["back"]}
];

function computeMuscleVolume(logEntries){
  const totals = {};
  MUSCLE_GROUPS.forEach(g=>totals[g]=0);
  logEntries.forEach(session=>{
    (session.ex||[]).forEach(e=>{
      const group = EXERCISE_MUSCLE_MAP[e.n];
      if(!group) return;
      (e.sets||[]).forEach(s=>{
        const w = parseFloat(s.w)||0, r = parseInt(s.r)||0;
        totals[group] += w*r;
      });
    });
  });
  return totals;
}
function radarCategoryVolumes(muscleVolumeTotals){
  return RADAR_CATEGORIES.map(cat=>cat.groups.reduce((s,g)=>s+(muscleVolumeTotals[g]||0), 0));
}

function periodLogStats(log, daysBack, offsetDays){
  offsetDays = offsetDays || 0;
  const end = new Date(Date.now() - offsetDays*86400000);
  const start = new Date(end.getTime() - daysBack*86400000);
  const inRange = log.filter(s=>{ const d = new Date(s.date); return d>=start && d<end; });
  const workouts = inRange.length;
  const duration = inRange.reduce((sum,s)=>sum+(s.duration||0),0);
  const sets = inRange.reduce((sum,s)=>sum+(s.ex||[]).reduce((s2,e)=>s2+((e.sets||[]).length),0), 0);
  const volume = inRange.reduce((sum,s)=>sum+(s.ex||[]).reduce((s2,e)=>s2+(e.sets||[]).reduce((s3,st)=>s3+(parseFloat(st.w)||0)*(parseInt(st.r)||0),0),0), 0);
  return {workouts, duration, sets, volume, log:inRange};
}

function fmtDuration(mins){
  mins = Math.round(mins);
  if(mins<60) return `${mins}m`;
  return `${Math.floor(mins/60)}h ${mins%60}m`;
}
function fmtVolume(v){
  v = Math.round(v);
  if(v>=1000) return `${(v/1000).toFixed(1)}k kg`;
  return `${v} kg`;
}
function metricDeltaHtml(cur, prev, fmt){
  const diff = cur - prev;
  if(Math.abs(diff) < 0.5) return `<span class="metric-delta flat">&#8212;</span>`;
  const cls = diff>0 ? "up" : "down";
  const arrow = diff>0 ? "&#9650;" : "&#9660;";
  return `<span class="metric-delta ${cls}">${arrow} ${fmt(Math.abs(diff))}</span>`;
}

function buildRadarChartSVG(currentVals, previousVals, labels){
  const N = labels.length;
  const W=300, H=300, cx=150, cy=150, maxR=98;
  const maxVal = Math.max(...currentVals, ...previousVals, 1);
  const angleFor = i => -Math.PI/2 + i*(2*Math.PI/N);
  const pointFor = (i, val) => {
    const r = (val/maxVal)*maxR;
    const a = angleFor(i);
    return [cx + r*Math.cos(a), cy + r*Math.sin(a)];
  };
  const rings = [0.25,0.5,0.75,1].map(frac=>{
    const pts = labels.map((_,i)=>{
      const a = angleFor(i), r = frac*maxR;
      return `${(cx+r*Math.cos(a)).toFixed(1)},${(cy+r*Math.sin(a)).toFixed(1)}`;
    }).join(" ");
    return `<polygon points="${pts}" fill="none" stroke="var(--line)" stroke-width="1"/>`;
  }).join("");
  const spokes = labels.map((_,i)=>{
    const a = angleFor(i);
    const x2 = cx+maxR*Math.cos(a), y2 = cy+maxR*Math.sin(a);
    return `<line x1="${cx}" y1="${cy}" x2="${x2.toFixed(1)}" y2="${y2.toFixed(1)}" stroke="var(--line)" stroke-width="1"/>`;
  }).join("");
  const labelPts = labels.map((lab,i)=>{
    const a = angleFor(i), lr = maxR + 20;
    const x = cx+lr*Math.cos(a), y = cy+lr*Math.sin(a);
    return `<text x="${x.toFixed(1)}" y="${y.toFixed(1)}" fill="var(--mute)" font-size="12" text-anchor="middle" dominant-baseline="middle">${lab}</text>`;
  }).join("");
  const prevPts = previousVals.map((v,i)=>pointFor(i,v).map(n=>n.toFixed(1)).join(",")).join(" ");
  const currPts = currentVals.map((v,i)=>pointFor(i,v).map(n=>n.toFixed(1)).join(",")).join(" ");
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    ${rings}${spokes}
    <polygon points="${prevPts}" fill="var(--mute)" opacity="0.15" stroke="var(--mute)" stroke-width="1.5" stroke-dasharray="4,3"/>
    <polygon points="${currPts}" fill="var(--accent)" opacity="0.25" stroke="var(--accent)" stroke-width="2"/>
    ${labelPts}
  </svg>`;
}

let exerciseMetricsTargetId = null;

let exerciseMetricsLog = [];

function getLoggedExerciseNames(log){
  const set = new Set();
  log.forEach(s=>(s.ex||[]).forEach(e=>{ if(e.sets && e.sets.length) set.add(e.n); }));
  return [...set].sort();
}

function computeExercisePoints(log, name){
  const points = [];
  log.forEach(s=>{
    const e = (s.ex||[]).find(x=>x.n===name);
    if(!e || !e.sets || !e.sets.length) return;
    let topWeight = null, repsAtTop = 0, volume = 0;
    e.sets.forEach(st=>{
      const w = parseFloat(st.w)||0, r = parseInt(st.r)||0;
      volume += w*r;
      if(topWeight===null || w>topWeight){ topWeight = w; repsAtTop = r; }
    });
    points.push({date:s.date, weight:topWeight||0, reps:repsAtTop, volume});
  });
  return points.sort((a,b)=>a.date.localeCompare(b.date));
}

    try{
      const snap = await getDoc(doc(db, "trackers", `${TRACKER_ID}-${exerciseMetricsTargetId}`));
      exerciseMetricsLog = snap.exists() ? (snap.data().log || []) : [];
    }catch(e){ exerciseMetricsLog = []; }
  }
  renderExercisePicker();
}

function totalSetsForExercise(log, name){
  let total = 0;
  log.forEach(s=>{
    const e = (s.ex||[]).find(x=>x.n===name);
    if(e && e.sets) total += e.sets.length;
  });
  return total;
}

function groupExercisesBySection(log, names){
  const groupToSection = {};
  MUSCLE_SECTIONS.forEach(sec=>sec.groups.forEach(g=>{ groupToSection[g] = sec.label; }));

  const buckets = {};
  names.forEach(n=>{
    const muscleGroup = EXERCISE_MUSCLE_MAP[n];
    const sectionLabel = groupToSection[muscleGroup] || "Other";
    if(!buckets[sectionLabel]) buckets[sectionLabel] = [];
    buckets[sectionLabel].push({name:n, sets:totalSetsForExercise(log, n)});
  });

  const sections = Object.keys(buckets).map(label=>{
    const items = buckets[label].sort((a,b)=>b.sets-a.sets);
    const total = items.reduce((s,i)=>s+i.sets, 0);
    return {label, total, items};
  });
  sections.sort((a,b)=>b.total-a.total);
  return sections;
}

function renderExercisePicker(){
  const names = getLoggedExerciseNames(exerciseMetricsLog);
  const person = exerciseMetricsIsSelf ? CURRENT_PROFILE : (PEOPLE.find(p=>p.id===exerciseMetricsTargetId) || {id:exerciseMetricsTargetId, name:exerciseMetricsTargetId});
  const backOnclick = exerciseMetricsIsSelf ? "home()" : `showClientDetail('${exerciseMetricsTargetId}')`;

  const sections = groupExercisesBySection(exerciseMetricsLog, names);
  const rows = sections.map(sec=>{
    const itemRows = sec.items.map(it=>`
      <div class="sess-row exrow" onclick="openExerciseMetrics('${it.name.replace(/'/g,"\\'")}')">
        ${EXERCISE_IMAGES[it.name] ? `<img class="dx-thumb" src="${EXERCISE_IMAGES[it.name]}" alt="">` : ""}
        <div class="sr-info"><b>${it.name}</b><span>${it.sets} set${it.sets!==1?"s":""} logged</span></div>
        <div style="color:var(--mute);font-size:18px">&rsaquo;</div>
      </div>`).join("");
    return `<div class="section-label" style="margin:14px 0 6px">${sec.label}</div>${itemRows}`;
  }).join("");

  app.innerHTML = `
    <div class="topbar">
      <button class="back" onclick="${backOnclick}">&#8592; Back</button>
      <div class="topbar-info"><h2>Exercise Metrics</h2><div class="focus">${person.name}</div></div>
    </div>
    ${rows || '<div class="chart-empty">No exercises logged yet &mdash; complete a session first.</div>'}
  `;
  window.scrollTo(0,0);
}

function openExerciseMetrics(name){
  exerciseMetricsName = name;
  exerciseMetricsPeriod = 7;
  renderExerciseMetrics();
}
function setExerciseMetricsPeriod(period){
  exerciseMetricsPeriod = period;
  renderExerciseMetrics();
}

function renderExerciseMetrics(){
  const allPoints = computeExercisePoints(exerciseMetricsLog, exerciseMetricsName);
  const cutoff = new Date(Date.now() - exerciseMetricsPeriod*86400000).toISOString();
  const points = allPoints.filter(p=>p.date>=cutoff);
  const last = points[points.length-1];

  // All-time PR is deliberately computed from the FULL history (allPoints),
  // not the period-filtered points, since it shouldn't change when toggling 7/30 days.
  let pr = null;
  allPoints.forEach(p=>{
    if(!pr || p.weight>pr.weight || (p.weight===pr.weight && p.reps>pr.reps)){
      pr = {weight:p.weight, reps:p.reps, date:p.date};
    }
  });
  const prHtml = pr ? `<div class="streak-hero">
      <div class="num">${pr.weight}kg &times; ${pr.reps}</div>
      <div class="lbl">All-time PR &middot; ${fmtDate(pr.date)}</div>
    </div>` : "";

  const weightChart = buildTrendChartSVG(points.map(p=>({date:p.date, value:p.weight})));
  const repsChart = buildTrendChartSVG(points.map(p=>({date:p.date, value:p.reps})));
  const volumeChart = buildTrendChartSVG(points.map(p=>({date:p.date, value:p.volume})));

  const periodToggle = `<div class="seg">
    <button class="${exerciseMetricsPeriod===7?"active":""}" onclick="setExerciseMetricsPeriod(7)">7 days</button>
    <button class="${exerciseMetricsPeriod===30?"active":""}" onclick="setExerciseMetricsPeriod(30)">30 days</button>
  </div>`;

  app.innerHTML = `
    <div class="topbar">
      <button class="back" onclick="renderExercisePicker()">&#8592; Back</button>
      <div class="topbar-info"><h2>${exerciseMetricsName}</h2><div class="focus">${points.length} session${points.length!==1?"s":""} in range</div></div>
    </div>
    ${prHtml}
    ${periodToggle}
    <div class="stat-row">
      <div class="stat-card"><div class="label">Top weight</div><div class="value">${last?last.weight+"kg":"&mdash;"}</div></div>
      <div class="stat-card"><div class="label">Reps at top</div><div class="value">${last?last.reps:"&mdash;"}</div></div>
      <div class="stat-card"><div class="label">Volume</div><div class="value">${last?last.volume:"&mdash;"}</div></div>
    </div>

    <div class="section-label">Weight &mdash; top set, last ${exerciseMetricsPeriod} days</div>
    <div class="chart-card">${weightChart}</div>

    <div class="section-label">Reps &mdash; at top weight, last ${exerciseMetricsPeriod} days</div>
    <div class="chart-card">${repsChart}</div>

    <div class="section-label">Total volume &mdash; last ${exerciseMetricsPeriod} days</div>
    <div class="chart-card">${volumeChart}</div>
    <div class="last-updated">Volume = weight &times; reps, summed across every set that exercise that session.</div>
  `;
  window.scrollTo(0,0);
}
