<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MK1 Tracker">
<meta name="theme-color" content="#15181f">
<title>MK1 Workout Tracker</title>
<style>
:root{
  --paper:#15181f; --card:#1e2230;
  --accent:#e2502a; --accent2:#c8401f;
  --mute:#8a90a0; --line:#2e3445; --text:#eceef2;
  --good:#3fae6a; --chip:#252c3a;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;background:var(--paper);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{padding-top:var(--safe-top);padding-bottom:var(--safe-bot)}
#app{max-width:500px;margin:0 auto;padding:14px 14px 100px}

.sync-banner{background:#2a1f1f;border:1.5px solid #5a3030;color:#e0a890;border-radius:14px;
  padding:12px 14px;font-size:12.5px;line-height:1.5;margin-bottom:14px}
.sync-ok{background:var(--chip);border:1.5px solid var(--line);color:var(--mute);border-radius:14px;
  padding:10px 14px;font-size:12px;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sync-ok .dot{width:7px;height:7px;border-radius:50%;background:var(--good);flex-shrink:0}

.page-header{padding:6px 0 4px}
.kicker{color:var(--accent);font-size:11px;font-weight:800;letter-spacing:.18em;text-transform:uppercase}
.page-header h1{font-size:26px;font-weight:800;letter-spacing:-.03em;margin-top:2px}
.page-header p{color:var(--mute);font-size:13px;margin-top:4px}

.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.scard{background:var(--card);border:1.5px solid var(--line);border-radius:16px;
  padding:16px 14px;cursor:pointer;transition:transform .08s;position:relative;overflow:hidden}
.scard:active{transform:scale(.97)}
.scard::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:var(--accent);opacity:0;transition:opacity .2s}
.scard.has-data::before{opacity:1}
.scard h2{font-size:16px;font-weight:800;letter-spacing:-.01em}
.scard .focus{color:var(--mute);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.scard .last{color:var(--mute);font-size:12px;margin-top:12px;line-height:1.4}
.scard .last b{color:var(--text)}

.histbtn{margin-top:12px;width:100%;background:none;border:1.5px dashed var(--line);
  color:var(--mute);border-radius:14px;padding:13px;font-size:14px;font-weight:700;cursor:pointer}

.topbar{display:flex;align-items:center;gap:10px;padding:6px 0 12px}
.back{background:var(--chip);border:none;color:var(--text);border-radius:11px;
  padding:9px 14px;font-size:14px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.topbar-info{flex:1;min-width:0}
.topbar-info h2{font-size:19px;font-weight:800;letter-spacing:-.02em}
.topbar-info .focus{color:var(--accent);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
.timer-chip{flex-shrink:0;background:var(--chip);border:1.5px solid var(--line);border-radius:11px;
  padding:7px 12px;text-align:center;line-height:1.1}
.timer-chip .tlabel{color:var(--mute);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.timer-chip .tval{color:var(--accent);font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:1px}

.ex{background:var(--card);border:1.5px solid var(--line);border-radius:16px;
  padding:14px;margin-bottom:10px;transition:border-color .2s}
.ex.done{border-color:var(--good)}
.ex-head{display:flex;justify-content:space-between;align-items:baseline;gap:8px;margin-bottom:2px}
.ex-name{font-weight:700;font-size:15px;line-height:1.3}
.ex-note{color:var(--mute);font-size:12px;font-style:italic;margin-top:2px;line-height:1.4}
.scheme{color:var(--accent);font-weight:800;font-size:13px;white-space:nowrap;flex-shrink:0}
.prev{color:var(--mute);font-size:12px;margin:5px 0 10px;line-height:1.4}
.prev b{color:var(--text)}

.sets{display:flex;flex-direction:column;gap:7px}
.setrow{display:grid;grid-template-columns:24px 1fr 1fr 42px 26px;gap:6px;align-items:center}
.setn{color:var(--mute);font-size:12px;font-weight:800;text-align:center;cursor:pointer;
  width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;
  background:var(--chip);border:1.5px solid var(--line);position:relative;user-select:none;
  -webkit-user-select:none;transition:border-color .15s;flex-shrink:0}
.setn[data-type="warmup"]{background:#2a1e10;border-color:#c97a20;color:#e89540}
.setn[data-type="dropset"]{background:#1e1a2a;border-color:#7c5ccc;color:#a07ee8}
.setn[data-type="failure"]{background:#2a1414;border-color:#aa3030;color:#e06060}
.set-type-popup{position:absolute;left:0;top:34px;z-index:200;
  background:#1a1d28;border:1.5px solid var(--line);border-radius:12px;
  padding:4px;box-shadow:0 8px 24px rgba(0,0,0,.6);min-width:148px}
.set-type-popup button{display:flex;align-items:center;gap:10px;width:100%;background:none;border:none;
  color:var(--text);padding:9px 10px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;text-align:left}
.set-type-popup button:active{background:var(--chip)}
.stp-badge{width:22px;height:22px;border-radius:6px;font-size:11px;font-weight:900;
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stp-normal{background:var(--chip);color:var(--mute);border:1px solid var(--line)}
.stp-warmup{background:#2a1e10;color:#e89540;border:1px solid #c97a20}
.stp-dropset{background:#1e1a2a;color:#a07ee8;border:1px solid #7c5ccc}
.stp-failure{background:#2a1414;color:#e06060;border:1px solid #aa3030}
/* Inline set-type badge used in history/reports */
.set-type-tag{display:inline-block;font-size:9px;font-weight:900;padding:1px 4px;
  border-radius:4px;vertical-align:middle;margin-right:2px}
.set-type-tag.warmup{background:#2a1e10;color:#e89540;border:1px solid #c97a20}
.set-type-tag.dropset{background:#1e1a2a;color:#a07ee8;border:1px solid #7c5ccc}
.set-type-tag.failure{background:#2a1414;color:#e06060;border:1px solid #aa3030}
.field{position:relative}
.setrow input{width:100%;background:var(--chip);border:1.5px solid var(--line);color:var(--text);
  border-radius:10px;padding:10px 6px;font-size:17px;font-weight:700;text-align:center;
  -webkit-appearance:none;appearance:none}
.setrow input:focus{outline:none;border-color:var(--accent)}
.setrow input::placeholder{color:#454e62;font-weight:600}
.trend-ind{position:absolute;top:-6px;right:-5px;width:15px;height:15px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;
  background:var(--chip);border:1.5px solid var(--line);color:var(--mute);opacity:0;
  transition:opacity .15s;pointer-events:none}
.trend-ind.up,.trend-ind.down,.trend-ind.same{opacity:1}
.trend-ind.up{background:var(--good);border-color:var(--good);color:#fff}
.trend-ind.down{background:var(--accent2);border-color:var(--accent2);color:#fff}
.trend-ind.same{background:var(--chip);border-color:var(--mute);color:var(--mute)}
.tick{background:var(--chip);border:1.5px solid var(--line);color:var(--mute);
  border-radius:10px;height:44px;font-size:18px;cursor:pointer;width:100%}
.tick.on{background:var(--good);border-color:var(--good);color:#fff}
.remove-set{background:none;border:none;color:#5a6070;font-size:18px;cursor:pointer;height:44px;width:100%}
.remove-set:active{color:#a04030}
.addset-btn{background:none;border:none;color:var(--mute);font-size:12px;font-weight:700;
  padding:8px 0 2px;cursor:pointer;letter-spacing:.04em}

/* ── Superset card ─────────────────────────────────────── */
.ss-card{background:var(--card);border:1.5px solid var(--accent2);border-radius:16px;
  padding:14px;margin-bottom:10px;transition:border-color .2s}
.ss-card.done{border-color:var(--good)}
.ss-badge{background:var(--accent2);color:#fff;font-size:9px;font-weight:900;letter-spacing:.1em;
  padding:3px 7px;border-radius:20px;flex-shrink:0}
.ss-header{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ss-names{flex:1;min-width:0}
.ss-ex-label{display:flex;align-items:baseline;gap:6px;line-height:1.5}
.ss-ex-letter{color:var(--accent2);font-size:10px;font-weight:900;flex-shrink:0;width:12px}
.ss-ex-name{font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ss-scheme{color:var(--mute);font-size:11px;font-weight:700;flex-shrink:0;margin-left:4px}
.ss-sets-label{color:var(--mute);font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0}
.ss-set-pair{display:grid;grid-template-columns:24px 1fr;gap:6px;margin-bottom:8px;align-items:start}
.ss-set-pair:last-of-type{margin-bottom:0}
.ss-set-n{color:var(--mute);font-size:12px;font-weight:800;text-align:center;padding-top:11px}
.ss-set-rows{display:flex;flex-direction:column;gap:5px}
.ss-row{display:grid;grid-template-columns:12px 1fr 1fr 42px;gap:5px;align-items:center}
.ss-row-letter{color:var(--accent2);font-size:9px;font-weight:900;text-align:center}
.ss-row input{width:100%;background:var(--chip);border:1.5px solid var(--line);color:var(--text);
  border-radius:10px;padding:8px 5px;font-size:15px;font-weight:700;text-align:center;
  -webkit-appearance:none;appearance:none}
.ss-row input:focus{outline:none;border-color:var(--accent2)}
.ss-row .tick{border-radius:10px;height:36px;font-size:16px;background:var(--chip);
  border:1.5px solid var(--line);color:var(--mute);cursor:pointer;width:100%}
.ss-row .tick.on{background:var(--good);border-color:var(--good);color:#fff}
/* Builder superset card */
.ss-draft{background:var(--card);border:1.5px solid var(--accent2);border-radius:12px;
  padding:10px 12px;margin-bottom:10px}
.ss-draft-header{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.ss-draft-ex{display:flex;align-items:center;gap:6px;margin-bottom:7px}
.ss-draft-ex:last-of-type{margin-bottom:0}
.ss-draft-ex-letter{color:var(--accent2);font-size:10px;font-weight:900;width:12px;flex-shrink:0}
.ss-draft-ex-name{flex:1;font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ss-draft-sets-row{display:flex;align-items:center;gap:6px;margin-top:8px}
.ss-draft-sets-label{font-size:11px;color:var(--mute);font-weight:700}
.ss-add-btn{background:var(--accent2);border:none;color:#fff;border-radius:10px;
  padding:0 14px;font-weight:800;font-size:13px;cursor:pointer;height:36px}

.savebar{position:fixed;bottom:0;left:0;right:0;
  background:linear-gradient(transparent,var(--paper) 30%);padding:16px 14px calc(16px + var(--safe-bot));pointer-events:none}
.savebar .inner{max-width:500px;margin:0 auto;pointer-events:all}
.save-btn{width:100%;background:var(--accent2);border:none;color:#fff;border-radius:16px;
  padding:17px;font-size:17px;font-weight:800;cursor:pointer}
.save-btn:disabled{opacity:.4}

.toast{position:fixed;top:calc(16px + var(--safe-top));left:50%;transform:translateX(-50%);
  background:var(--good);color:#fff;padding:11px 20px;border-radius:99px;
  font-weight:700;font-size:14px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:99;white-space:nowrap}
.toast.show{opacity:1}

.hday{background:var(--card);border:1.5px solid var(--line);border-radius:16px;padding:14px;margin-bottom:10px}
.hday-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.hday-head b{font-size:15px;font-weight:800}
.hday-head span{color:var(--mute);font-size:12px}
.hday-head .dur{color:var(--accent);font-weight:700}
.hrow{display:flex;justify-content:space-between;gap:10px;font-size:13px;
  padding:6px 0;border-top:1px solid var(--line);align-items:baseline}
.hrow .hn{color:var(--mute);flex:1}
.hrow .hv{font-weight:700;text-align:right;white-space:nowrap;color:var(--text)}
.del-btn{background:none;border:none;color:#7a4040;font-size:12px;font-weight:700;cursor:pointer;padding:8px 0 0}

.empty{color:var(--mute);text-align:center;padding:50px 20px;font-size:14px;line-height:1.7}
.empty strong{color:var(--text);display:block;font-size:16px;margin-bottom:8px}
.section-label{color:var(--mute);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;
  margin:20px 0 10px;display:flex;align-items:center;justify-content:space-between}
.icon-btn{background:var(--chip);border:1.5px solid var(--line);color:var(--text);border-radius:9px;
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;font-size:13px;
  cursor:pointer;flex-shrink:0}
.icon-btn:active{border-color:var(--accent)}
.label-actions{display:flex;gap:6px}
.loading{color:var(--mute);text-align:center;padding:60px 20px;font-size:14px}
.last-updated{text-align:center;color:var(--mute);font-size:12px;margin:6px 0 18px;line-height:1.6}
.last-updated b{color:var(--text)}

.profile-wrap{padding-top:40px}
.profile-title{text-align:center;margin-bottom:30px}
.profile-title h1{margin-top:6px}
.profile-grid{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
.profile-card{background:var(--card);border:1.5px solid var(--line);border-radius:20px;padding:24px 20px;
  width:140px;text-align:center;cursor:pointer;transition:transform .08s,border-color .15s}
.profile-card:active{transform:scale(.96)}
.profile-avatar{width:56px;height:56px;border-radius:50%;background:var(--accent2);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;margin:0 auto 12px;
  background-size:cover;background-position:center}
.photo-upload-row{display:flex;align-items:center;gap:16px;margin-bottom:18px}
.photo-preview{width:72px;height:72px;border-radius:50%;background:var(--accent2);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:800;flex-shrink:0;
  background-size:cover;background-position:center}
.photo-upload-actions{display:flex;flex-direction:column;gap:8px;flex:1}
.photo-upload-btn{background:var(--chip);border:1.5px solid var(--line);color:var(--text);
  border-radius:10px;padding:10px 14px;font-size:13px;font-weight:700;cursor:pointer;text-align:center}
.photo-remove-btn{background:none;border:none;color:#a04030;font-size:12px;font-weight:700;
  cursor:pointer;padding:0;text-align:left}
.profile-name{font-size:16px;font-weight:800}

.auth-wrap{padding-top:40px;max-width:380px;margin:0 auto}
.auth-title{text-align:center;margin-bottom:22px}
.auth-tabs{display:flex;background:var(--chip);border:1.5px solid var(--line);border-radius:12px;
  padding:3px;margin-bottom:18px}
.auth-tabs button{flex:1;background:none;border:none;color:var(--mute);font-size:13px;font-weight:700;
  padding:10px 4px;border-radius:9px;cursor:pointer}
.auth-tabs button.active{background:var(--accent2);color:#fff}
.auth-field{margin-bottom:12px}
.auth-field label{display:block;color:var(--mute);font-size:11px;font-weight:800;
  text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.auth-field input{width:100%;background:var(--chip);border:1.5px solid var(--line);color:var(--text);
  border-radius:10px;padding:12px;font-size:15px;font-weight:600;-webkit-appearance:none;appearance:none}
.auth-field input:focus{outline:none;border-color:var(--accent)}
.auth-btn{width:100%;background:var(--accent2);border:none;color:#fff;border-radius:14px;
  padding:15px;font-size:15px;font-weight:800;cursor:pointer;margin-top:6px}
.auth-link-btn{background:none;border:none;color:var(--mute);font-size:12.5px;font-weight:700;
  cursor:pointer;text-align:center;width:100%;padding:10px 0;text-decoration:underline}
.auth-divider{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--mute);font-size:12px;font-weight:700}
.auth-divider::before,.auth-divider::after{content:"";flex:1;height:1px;background:var(--line)}
.google-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;
  background:#fff;border:1.5px solid #dadce0;color:#3c4043;border-radius:14px;
  padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.auth-error{background:#2a1f1f;border:1.5px solid #5a3030;color:#e0a890;border-radius:10px;
  padding:10px 12px;font-size:12.5px;margin-bottom:12px}
.field-hint{color:var(--mute);font-size:11px;margin-top:5px;line-height:1.35}

.switch-profile{display:inline-flex;align-items:center;gap:6px;background:var(--chip);border:1px solid var(--line);
  border-radius:99px;padding:5px 12px 5px 6px;font-size:11.5px;font-weight:700;color:var(--text);
  cursor:pointer;margin-top:10px}
.avatar-sm{width:18px;height:18px;border-radius:50%;background:var(--accent2);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;
  background-size:cover;background-position:center}

.weightbtn{margin-top:10px;width:100%;background:var(--card);border:1.5px solid var(--line);
  color:var(--text);border-radius:14px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:space-between}
.weightbtn .wb-label{display:flex;align-items:center;gap:8px}
.weightbtn .wb-current{color:var(--accent);font-weight:800}

.stat-row{display:flex;gap:8px;margin-bottom:14px}
.stat-card{flex:1;background:var(--card);border:1.5px solid var(--line);border-radius:14px;
  padding:12px 8px;text-align:center}
.stat-card .label{color:var(--mute);font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em}
.stat-card .value{font-size:17px;font-weight:800;margin-top:4px;font-variant-numeric:tabular-nums}
.stat-card .value.up{color:var(--accent)}
.stat-card .value.down{color:var(--good)}
.stat-card .value.flat{color:var(--mute)}
.stat-card .label .metric-delta{display:block;font-size:10px;font-weight:800;margin-top:2px;text-transform:none;letter-spacing:0}
.metric-delta.up{color:var(--good)}
.metric-delta.down{color:var(--accent)}
.metric-delta.flat{color:var(--mute)}
.radar-legend{display:flex;gap:18px;justify-content:center;margin-top:4px;font-size:11px;color:var(--mute)}
.radar-legend .dot{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px}

.chart-card{background:var(--card);border:1.5px solid var(--line);border-radius:16px;
  padding:14px 10px;margin-bottom:14px}
.chart-card svg{width:100%;height:auto;display:block;overflow:visible}
.chart-empty{color:var(--mute);font-size:13px;text-align:center;padding:34px 10px;line-height:1.6}

.weight-form{display:flex;gap:8px;margin-bottom:16px}
.weight-form input{flex:1;background:var(--chip);border:1.5px solid var(--line);color:var(--text);
  border-radius:10px;padding:12px;font-size:16px;font-weight:700;text-align:center;
  -webkit-appearance:none;appearance:none}
.weight-form input:focus{outline:none;border-color:var(--accent)}
.weight-form button{background:var(--accent2);border:none;color:#fff;border-radius:10px;
  padding:0 20px;font-weight:800;font-size:14px;cursor:pointer;flex-shrink:0}

.cardio-form{background:var(--card);border:1.5px solid var(--line);border-radius:14px;padding:14px;margin-bottom:16px}
.checkin-banner{background:linear-gradient(135deg,var(--accent2),var(--accent));border-radius:16px;
  padding:18px;margin-bottom:16px;color:#fff}
.checkin-banner-title{font-size:18px;font-weight:800;margin-bottom:4px}
.checkin-banner-sub{font-size:12.5px;opacity:.88}
.checkin-metrics{margin-bottom:4px}
.checkin-textarea{width:100%;background:var(--chip);border:1.5px solid var(--line);color:var(--text);
  border-radius:12px;padding:12px;font-size:14px;font-family:inherit;resize:none;min-height:100px;
  box-sizing:border-box;margin-bottom:12px}
.checkin-comment-card{background:var(--card);border:1.5px solid var(--line);border-radius:12px;
  padding:14px;font-size:14px;color:var(--mute);font-style:italic;margin-bottom:12px;line-height:1.5}

.hiit-ex-row.active{border-color:var(--accent);background:var(--chip)}

.hiit-timer-card{background:var(--card);border:2px solid var(--line);border-radius:20px;
  padding:30px 20px;text-align:center;margin-bottom:16px;transition:border-color .3s}
.hiit-timer-card.rest{border-color:var(--good)}
.hiit-timer-card.work{border-color:var(--accent)}
.hiit-timer-card.amrap{border-color:var(--accent)}
.hiit-phase{font-size:13px;font-weight:800;letter-spacing:.1em;color:var(--mute);text-transform:uppercase}
.hiit-countdown{font-size:56px;font-weight:800;font-variant-numeric:tabular-nums;margin:8px 0;color:var(--text)}
.hiit-exname{font-size:16px;font-weight:700;color:var(--accent)}
.hiit-controls{display:flex;gap:10px;margin-bottom:18px}
.hiit-ctrl-btn{flex:1;background:var(--chip);border:1.5px solid var(--line);color:var(--text);
  border-radius:14px;padding:14px;font-size:14px;font-weight:800;cursor:pointer}
.hiit-ctrl-btn.primary{background:var(--accent2);border-color:var(--accent2);color:#fff}
.round-rest-row{display:flex;align-items:center;justify-content:space-between;background:var(--chip);
  border:1.5px solid var(--line);border-radius:10px;padding:11px 12px;margin-top:10px}
.round-rest-row .rr-label{font-size:13px;font-weight:700}
.round-rest-row input[type=checkbox]{width:20px;height:20px;accent-color:var(--accent2);flex-shrink:0}
.round-rest-sec{margin-top:8px}
.round-rest-sec input{width:100%;background:var(--chip);border:1.5px solid var(--line);color:var(--text);
  border-radius:10px;padding:11px;font-size:15px;font-weight:700;text-align:center;
  -webkit-appearance:none;appearance:none}
</style>

function avatarHtml(p, cls){
  const photo = p.photo || KNOWN_PHOTOS[p.id];
  return photo
    ? `<div class="${cls}" style="background-image:url('${photo}')"></div>`
    : `<div class="${cls}">${(p.name||"?")[0]}</div>`;
}

// The directory of everyone using this tracker (clients and trainers) now
// lives in Firestore instead of being hardcoded, so a trainer can add new
// clients without needing a code change. Seeded once with Ed and Tara.
const DEFAULT_PEOPLE = [
  {id:"ed", name:"Ed", role:"client", clientIds:[]},
  {id:"tara", name:"Tara", role:"client", clientIds:[]}
];
let PEOPLE = [];
function peopleDocRef(){ return doc(db, "meta", "people"); }

// A deliberately narrow, public-readable lookup so people can log in with
// either their username or their real email. It contains ONLY email->username
// pairs - no names, roles, or client links - everything else stays behind
// the normal "must be signed in" rule.
function loginLookupDocRef(){ return doc(db, "meta", "login-lookup"); }

async function getUsernameForEmail(email){
  try{
    const snap = await getDoc(loginLookupDocRef());
    const map = (snap.exists() && snap.data().map) ? snap.data().map : {};
    return map[email.trim().toLowerCase()] || null;
  }catch(e){ return null; }
}
async function registerLoginLookup(email, username){
  try{
    const snap = await getDoc(loginLookupDocRef());
    const map = (snap.exists() && snap.data().map) ? snap.data().map : {};
    map[email.trim().toLowerCase()] = username;
    await setDoc(loginLookupDocRef(), {map});
    return true;
  }catch(e){ return false; }
}

// New direction, used now that the real email IS the Firebase Auth
// credential going forward: resolve a typed username straight to its real
// email so we can sign in directly. The old email->username doc above is
// kept untouched as a fallback for any account that hasn't completed the
// one-time migration yet (still registered under the old placeholder email).
function usernameLookupDocRef(){ return doc(db, "meta", "username-lookup"); }
async function getEmailForUsername(username){
  try{
    const snap = await getDoc(usernameLookupDocRef());
    const map = (snap.exists() && snap.data().map) ? snap.data().map : {};
    return map[username.trim().toLowerCase()] || null;
  }catch(e){ return null; }
}
async function registerUsernameLookup(username, email){
  try{
    const snap = await getDoc(usernameLookupDocRef());
    const map = (snap.exists() && snap.data().map) ? snap.data().map : {};
    map[username.trim().toLowerCase()] = email;
    await setDoc(usernameLookupDocRef(), {map});
    return true;
  }catch(e){ return false; }
}

async function loadPeople(){
  try{
    const snap = await getDoc(peopleDocRef());
    if(snap.exists() && Array.isArray(snap.data().list) && snap.data().list.length){
      PEOPLE = snap.data().list;
    } else {
      PEOPLE = JSON.parse(JSON.stringify(DEFAULT_PEOPLE));
      await setDoc(peopleDocRef(), {list: PEOPLE});
    }
  }catch(e){
    PEOPLE = JSON.parse(JSON.stringify(DEFAULT_PEOPLE));
  }
}
async function savePeople(){
  try{ await setDoc(peopleDocRef(), {list: PEOPLE}); return true; }catch(e){ return false; }
}

// ── Generic "viewing someone's data" mechanism ─────────────
// Every per-person screen (Activity, Muscle Map, Body Measurements,
// Dashboard, Exercise Metrics, and any future one) reads these three and
// calls fetchPersonData - that's the whole contract. Adding a new per-person
// view never needs bespoke self-vs-client plumbing again.
let viewingPersonId = null;
let viewingIsSelf = true;
let viewingBackTarget = "home()";

function startViewing(personId, backTargetCall){
  viewingPersonId = personId || CURRENT_PROFILE.id;
  viewingIsSelf = viewingPersonId === CURRENT_PROFILE.id;
  viewingBackTarget = backTargetCall || "home()";
}

function viewingPersonLabel(){
  if(viewingIsSelf) return CURRENT_PROFILE;
  return PEOPLE.find(p=>p.id===viewingPersonId) || {id:viewingPersonId, name:viewingPersonId};
}

async function fetchPersonData(personId){
  if(personId===CURRENT_PROFILE.id){
    return {log:LOG, weights:WEIGHTS, measurements:MEASUREMENTS, plan:PLAN, hiitClasses:HIIT_CLASSES, cardioLog:CARDIO_LOG};
  }
  try{
    const snap = await getDoc(doc(db, "trackers", `${TRACKER_ID}-${personId}`));
    if(snap.exists()){
      const d = snap.data();
      return {log:d.log||[], weights:d.weights||[], measurements:d.measurements||[], plan:d.plan||[], hiitClasses:d.hiitClasses||[], cardioLog:d.cardioLog||[]};
    }
  }catch(e){}
  return {log:[], weights:[], measurements:[], plan:[], hiitClasses:[], cardioLog:[]};
}

const $ = id => document.getElementById(id);

const fmtDate = iso => new Date(iso).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
const timeAgo = iso => {
  const days = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
  if(days<=0) return "today";
  if(days===1) return "yesterday";
  if(days<14) return `${days} days ago`;
  const weeks = Math.floor(days/7);
  return `${weeks} week${weeks!==1?"s":""} ago`;
};
const lastOf = id => [...LOG].filter(w=>w.sessionId===id).sort((a,b)=>b.date.localeCompare(a.date))[0];

// Local calendar-day string (YYYY-MM-DD), using the browser's local date
// components rather than the UTC date toISOString() would give. Using UTC
// here was the source of a real bug: anyone in a timezone ahead of UTC (UK
// during BST, for instance) would have "today" silently resolve to the UTC
// date, which can be a full day behind local midnight - sessions logged
// today were vanishing from the heatmap entirely. Every day-bucketing
// feature in the app should go through this one function.
function localDayKey(d){
  const dt = (d instanceof Date) ? d : new Date(d);
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,"0")}-${String(dt.getDate()).padStart(2,"0")}`;
}
function dayKey(iso){ return localDayKey(iso); }
function trainedDaysSetFor(log){ return new Set(log.map(w=>dayKey(w.date))); }

function weekStreakFor(log){
  const days = trainedDaysSetFor(log);
  function weekHasSession(weekStart){
    for(let i=0;i<7;i++){
      const d = new Date(weekStart); d.setDate(d.getDate()+i);
      if(days.has(localDayKey(d))) return true;
    }
    return false;
  }
  const now = new Date();
  const dow = (now.getDay()+6)%7; // 0 = Monday
  let weekStart = new Date(now); weekStart.setDate(now.getDate()-dow); weekStart.setHours(0,0,0,0);
  let streak = 0;
  let cursor = new Date(weekStart);
  while(weekHasSession(cursor)){
    streak++;
    cursor.setDate(cursor.getDate()-7);
  }
  return streak;
}

function sessionsInRange(log, startISO, endISO){
  return log.filter(w=>w.date>=startISO && w.date<endISO).length;
}

function buildHeatmap(log){
  const days = trainedDaysSetFor(log);
  const today = new Date(); today.setHours(0,0,0,0);
  const totalDays = 84;
  let start = new Date(today); start.setDate(today.getDate()-totalDays+1);
  const dow = (start.getDay()+6)%7;
  start.setDate(start.getDate()-dow);
  const cells = [];
  let cursor = new Date(start);
  while(cursor<=today){
    const key = localDayKey(cursor);
    cells.push({date:key, trained:days.has(key)});
    cursor.setDate(cursor.getDate()+1);
  }
  const cols = [];
  for(let i=0;i<cells.length;i+=7) cols.push(cells.slice(i,i+7));
  const colsHtml = cols.map(week=>{
    const squares = week.map(c=>`<div class="heat-cell ${c.trained?"on":""}" title="${c.date}"></div>`).join("");
    return `<div class="heat-col">${squares}</div>`;
  }).join("");
  const dayLetters = ["M","T","W","T","F","S","S"];
  const labelsHtml = dayLetters.map(d=>`<div class="heat-daylabel">${d}</div>`).join("");
  return `<div class="heat-outer">
    <div class="heat-daylabels">${labelsHtml}</div>
    <div class="heat-wrap"><div class="heat-grid">${colsHtml}</div></div>
  </div>`;
}

function allTimeBest(exerciseName){
  let best = null;
  LOG.forEach(session=>{
    session.ex.forEach(e=>{
      if(e.n!==exerciseName) return;
      e.sets.forEach(s=>{
        const w = parseFloat(s.w);
        if(isNaN(w)) return;
        const r = parseInt(s.r)||0;
        if(!best || w>best.weight || (w===best.weight && r>best.reps)){
          best = {weight:w, reps:r};
        }
      });
    });
  });
  return best;
}

let timerStart=null, timerInterval=null;
function fmtElapsed(ms){ const s=Math.floor(ms/1000); return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`; }
function startTimer(){
  stopTimer(); timerStart=Date.now();
  timerInterval=setInterval(()=>{ const el=$("sessionTimer"); if(!el){stopTimer();return;} el.textContent=fmtElapsed(Date.now()-timerStart); },1000);
}
function stopTimer(){ if(timerInterval){clearInterval(timerInterval); timerInterval=null;} }

let restInterval=null, restRemaining=0;
function fmtRest(sec){ return `${Math.floor(sec/60)}:${String(sec%60).padStart(2,"0")}`; }
function startRest(seconds){
  clearInterval(restInterval);
  restRemaining = seconds;
  renderRest();
  restInterval = setInterval(()=>{
    restRemaining--;
    if(restRemaining<=0){
      clearInterval(restInterval); restInterval=null; restRemaining=0;
      renderRest();
      try{ if(navigator.vibrate) navigator.vibrate([200,100,200]); }catch(e){}
      playBeep();
      showToast("\u23F1 Rest over \u2014 back to it!");
      return;
    }
    renderRest();
  },1000);
}
function cancelRest(){
  clearInterval(restInterval); restInterval=null; restRemaining=0; renderRest();
}
function renderRest(){
  const el = $("restDisplay");
  if(!el) return;
  if(restInterval){
    el.textContent = fmtRest(restRemaining);
    el.classList.add("running");
  } else {
    el.textContent = "Rest";
    el.classList.remove("running");
  }
}
function playBeep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type="sine"; o.frequency.value=880;
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.0001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.3, ctx.currentTime+0.02);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+0.5);
    o.stop(ctx.currentTime+0.55);
  }catch(e){}
}

// Firestore writes made in the instant right after createUserWithEmailAndPassword
// can occasionally fail even though the account creation itself succeeded -
// there's a brief window where the auth token isn't fully propagated yet.
// A short retry absorbs that without masking a genuine, persistent failure.
async function writeWithRetry(fn, attempts){
  attempts = attempts || 3;
  let lastErr;
  for(let i=0;i<attempts;i++){
    try{ return await fn(); }
    catch(e){ lastErr = e; if(i<attempts-1) await new Promise(r=>setTimeout(r, 400)); }
  }
  throw lastErr;
}

function uniquePersonId(name){
  const base = slugify(name);
  let id = base, n = 2;
  while(PEOPLE.some(p=>p.id===id)){ id = `${base}-${n}`; n++; }
  return id;
}

async function submitAuth(){
  const input = ($("authUsername").value||"").trim();
  const password = $("authPassword").value||"";
  if(!input || !password){ authError="Enter your username/email and password."; renderAuthScreen(); return; }

  if(authMode==="login"){
    const looksLikeEmail = input.includes("@");

    if(looksLikeEmail){
      // New-scheme accounts are registered directly under their real email now.
      try{
        await signInWithEmailAndPassword(auth, input, password);
        return;
      }catch(directErr){
        // Only fall back if no account exists under that email at all - a
        // genuine wrong-password on an existing account should surface as-is,
        // not get masked by a confusing second attempt.
        if(directErr && (directErr.code==="auth/user-not-found" || directErr.code==="auth/invalid-email")){
          const legacyUsername = await getUsernameForEmail(input);
          if(legacyUsername){
            try{
              await signInWithEmailAndPassword(auth, usernameToEmail(legacyUsername), password);
              return;
            }catch(e){ /* fall through to generic error below */ }
          }
        }
        authError = "Couldn't log in. Check your username/email and password.";
        renderAuthScreen();
        return;
      }
    } else {
      // Username path: try the new lookup's real email first, but a real
      // email change isn't instant any more (Firebase requires clicking a
      // verification link before it actually takes effect) - so during that
      // window the lookup can point at an email Firebase hasn't activated
      // yet. Always fall back to the legacy placeholder-email derivation
      // before giving up, rather than failing outright.
      const resolvedEmail = await getEmailForUsername(input);
      const candidates = resolvedEmail ? [resolvedEmail, usernameToEmail(input)] : [usernameToEmail(input)];
      for(const candidate of candidates){
        try{
          await signInWithEmailAndPassword(auth, candidate, password);
          return;
        }catch(e){ /* try next candidate */ }
      }
      authError = "Couldn't log in. Check your username/email and password.";
      renderAuthScreen();
      return;
    }
  }

  // signup - everyone goes through the same generic flow now; the original
  // Ed/Tara "claim your existing profile" step was only needed for the
  // one-time migration when auth was first introduced, and that's done.
  const username = input;
  const password2 = $("authPassword2") ? $("authPassword2").value : "";
  const realEmail = ($("authEmail")?.value||"").trim();
  const displayName = ($("authDisplayName")?.value||"").trim();
  if(!displayName){ authError="Enter your name."; renderAuthScreen(); return; }
  if(!realEmail || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(realEmail)){
    authError = "Enter a valid email address.";
    renderAuthScreen();
    return;
  }
  if(password.length<6){ authError="Password needs to be at least 6 characters."; renderAuthScreen(); return; }
  if(password!==password2){ authError="Passwords don't match."; renderAuthScreen(); return; }
  if(!signupLocations.length){ authError="Pick at least one gym location."; renderAuthScreen(); return; }

  await loadPeople();
  const usernameTaken = await getEmailForUsername(username);
  if(usernameTaken){
    authError = "That username is already taken \u2014 please choose another.";
    renderAuthScreen();
    return;
  }

  const role = signupRole || "client";
  const locations = role==="client" ? signupLocations.slice(0,1) : [...signupLocations];
  const profileId = uniquePersonId(displayName);

  signupInProgress = true;
  let cred = null;
  try{
    // Registered directly under the real email now, so genuine password-reset
    // emails have somewhere real to go - no more synthetic placeholder address.
    cred = await createUserWithEmailAndPassword(auth, realEmail, password);
    await writeWithRetry(()=>setDoc(doc(db,"users",cred.user.uid), {profileId}));
    PEOPLE.push({id:profileId, name:displayName, role, clientIds:[], uid:cred.user.uid, email:realEmail, username, locations});
    await writeWithRetry(()=>savePeople());
    await writeWithRetry(()=>registerLoginLookup(realEmail, username));
    await writeWithRetry(()=>registerUsernameLookup(username, realEmail));
    // createUserWithEmailAndPassword auto-signs the user in, which fires the
    // auth listener immediately - before the writes just above had finished.
    // That race used to make the very next boot fail to find the profile it
    // hadn't been written yet, sign the user back out, and show a confusing
    // error. Booting explicitly here, now that everything is confirmed
    // written, avoids that entirely.
    signupInProgress = false;
    await bootForUser(cred.user);
  }catch(e){
    signupInProgress = false;
    if(cred){
      // The login was created but the profile write never completed even
      // after retrying - roll the login back too, rather than leaving an
      // orphaned account with no profile that silently blocks this email
      // from ever being used to sign up again.
      try{ await deleteUser(cred.user); }catch(rollbackErr){ /* best effort */ }
    }
    if(e && e.code==="auth/email-already-in-use"){
      authError = "That email is already registered.";
    } else {
      authError = `Couldn't create that account (${(e&&e.code)||"unknown error"}). Please try again.`;
    }
    renderAuthScreen();
  }
}

function logOut(){

}

async function bootForUser(user){
  if(!user){
    CURRENT_PROFILE = null;
    renderAuthScreen();
    return;
  }
  app.innerHTML = `<div class="loading">Loading your data&hellip;</div>`;
  await loadPeople();
  await loadLocations();
  await ensureEdIsAdmin();

  let mapping = null;
  try{
    const snap = await getDoc(doc(db,"users",user.uid));
    mapping = snap.exists() ? snap.data() : null;
  }catch(e){}

  // If no UID mapping exists yet, check whether this Google account's email
  // is already linked to a profile from a prior email/password signup —
  // if so, reuse that profile rather than creating a duplicate.
  if(!mapping || !mapping.profileId){
    const isGoogle = user.providerData && user.providerData.some(p=>p.providerId==="google.com");
    if(isGoogle && user.email){
      const username = await getUsernameForEmail(user.email);
      if(username){
        const existing = PEOPLE.find(p=>p.username===username || p.email===user.email);
        if(existing){
          await writeWithRetry(()=>setDoc(doc(db,"users",user.uid),{profileId:existing.id}));
          if(!existing.uid){ existing.uid = user.uid; await savePeople(); }
          mapping = {profileId: existing.id};
        }
      }
    }
    if(!mapping || !mapping.profileId){
      if(isGoogle){
        // Brand new Google user — show the lightweight finish-setup screen
        showGoogleFinishSetup(user);
        return;
      }
      authError = "Couldn't find your profile. Please contact your admin.";
      await signOut(auth);
      return;
    }
  }

  CURRENT_PROFILE = PEOPLE.find(p=>p.id===mapping.profileId) || {id:mapping.profileId, name:mapping.profileId, role:"client", clientIds:[]};
  await loadLog();
  await deduplicateHiitLog();
  home();
}

function openSession(id){
  const p = PLAN.find(x=>x.id===id);
  const last = lastOf(id);

  const blocks = p.ex.map((e,i)=>{
    if(e.superset){
      // ── Superset block ──────────────────────────────────
      const prevA = last && last.ex.find(le=>le.n===e.exA.n);
      const prevB = last && last.ex.find(le=>le.n===e.exB.n);
      const lastA = prevA && prevA.sets.length
        ? prevA.sets.map(s=>fmtSet(s)).join(" · ")
        : null;
      const lastB = prevB && prevB.sets.length
        ? prevB.sets.map(s=>fmtSet(s)).join(" · ")
        : null;
      const prevHtml = (lastA||lastB)
        ? `<div class="prev">${lastA?`Last A: <b>${lastA}</b>`:""}${lastA&&lastB?" &nbsp;·&nbsp; ":""}${lastB?`Last B: <b>${lastB}</b>`:""}</div>`
        : `<div class="prev">First time logging this superset</div>`;

      const setPairs = Array.from({length:e.s},(_,si)=>{
        const pwA = prevA&&prevA.sets[si] ? prevA.sets[si].w : "";
        const prA = prevA&&prevA.sets[si] ? prevA.sets[si].r : "";
        const pwB = prevB&&prevB.sets[si] ? prevB.sets[si].w : "";
        const prB = prevB&&prevB.sets[si] ? prevB.sets[si].r : "";
        return `<div class="ss-set-pair">
          <div class="ss-set-n">S${si+1}</div>
          <div class="ss-set-rows">
            <div class="ss-row" data-pw="${pwA}" data-pr="${prA}">
              <div class="ss-row-letter">A</div>
              <input type="number" inputmode="decimal" step="0.5" min="0" class="w-input" placeholder="${pwA?pwA+" kg":"kg"}">
              <input type="number" inputmode="numeric" min="0" class="r-input" placeholder="${prA?prA+" reps":"reps"}">
              <button class="tick" onclick="tick(this)">&#10003;</button>
            </div>
            <div class="ss-row" data-pw="${pwB}" data-pr="${prB}">
              <div class="ss-row-letter">B</div>
              <input type="number" inputmode="decimal" step="0.5" min="0" class="w-input" placeholder="${pwB?pwB+" kg":"kg"}">
              <input type="number" inputmode="numeric" min="0" class="r-input" placeholder="${prB?prB+" reps":"reps"}">
              <button class="tick" onclick="tick(this)">&#10003;</button>
            </div>
          </div>
        </div>`;
      }).join("");

      return `<div class="ss-card" id="ex${i}">
        <div class="ss-header">
          <span class="ss-badge">SS</span>
          <div class="ss-names">
            <div class="ss-ex-label">
              <span class="ss-ex-letter">A</span>
              <span class="ss-ex-name">${e.exA.n}</span>
              <span class="ss-scheme">×${e.exA.r}</span>
            </div>
            <div class="ss-ex-label">
              <span class="ss-ex-letter">B</span>
              <span class="ss-ex-name">${e.exB.n}</span>
              <span class="ss-scheme">×${e.exB.r}</span>
            </div>
          </div>
          <span class="ss-sets-label">${e.s} set${e.s!==1?"s":""}</span>
        </div>
        ${prevHtml}
        <div class="ss-sets" id="sets${i}">${setPairs}</div>
      </div>`;
    }

    // ── Regular exercise block ─────────────────────────────
    const prev = last && last.ex.find(le=>le.n===e.n);
    const prevHtml = (prev && prev.sets.length)
      ? `Last: <b>${prev.sets.map(s=>fmtSet(s)).join(" &nbsp;\u00b7&nbsp; ")}</b>`
      : "First time logging this exercise";
    const priorBest = allTimeBest(e.n);
    const bestHtml = priorBest ? ` &nbsp;·&nbsp; &#127942; PR: <b>${priorBest.weight}kg×${priorBest.reps}</b>` : "";
    const rows = Array.from({length:e.s},(_,si)=>{
      const pw = prev&&prev.sets[si] ? prev.sets[si].w : "";
      const pr = prev&&prev.sets[si] ? prev.sets[si].r : "";
      const pt = prev&&prev.sets[si] ? (prev.sets[si].type||"") : "";
      return makeSetRow(si,pw,pr,pt);
    }).join("");
    return `<div class="ex" id="ex${i}">
      <div class="ex-head"><div class="ex-name">${i+1}. ${e.n}</div><div class="scheme">${e.s}&times;${e.r}</div></div>
      ${e.note ? `<div class="ex-note">${e.note}</div>` : ""}
      <div class="prev">${prevHtml}${bestHtml}</div>
      <div class="sets" id="sets${i}">${rows}</div>
      <button class="addset-btn" onclick="addSet(${i},event)">+ add set</button>
    </div>`;
  }).join("");

  const footer = last
    ? `<div class="last-updated">Last workout: <b>${fmtDate(last.date)}</b> &middot; ${timeAgo(last.date)}</div>`
    : `<div class="last-updated">No previous workout logged for this session yet</div>`;

  app.innerHTML = `
    <div class="topbar">
      <button class="back" onclick="home()">&#8592; Back</button>
      <div class="topbar-info"><h2>${p.name}</h2><div class="focus">${p.focus}</div></div>
      <div class="timer-chip"><div class="tlabel">Time</div><div class="tval" id="sessionTimer">0:00</div></div>
    </div>
    ${blocks}
    ${footer}
    <div class="rest-bar">
      <button class="rest-chip" onclick="startRest(60)">60s</button>
      <button class="rest-chip" onclick="startRest(90)">90s</button>
      <button class="rest-chip" onclick="startRest(120)">120s</button>
      <div class="rest-display" id="restDisplay" onclick="cancelRest()">Rest</div>
    </div>
    <div class="savebar"><div class="inner"><button class="save-btn" onclick="saveSession('${id}')">Save session</button></div></div>`;
  window.scrollTo(0,0);
  startTimer();
}

// ── Set-type system (Warm-up / Drop Set / Failure) ────────
const SET_TYPE_META = {
  normal:  {label:"Normal",   badge:"S#", dataType:"",        cls:"stp-normal"},
  warmup:  {label:"Warm-up",  badge:"W",  dataType:"warmup",  cls:"stp-warmup"},
  dropset: {label:"Drop Set", badge:"D",  dataType:"dropset", cls:"stp-dropset"},
  failure: {label:"Failure",  badge:"F",  dataType:"failure", cls:"stp-failure"},
};
let _activeSetTypeRow = null;

function openSetTypePopup(setn){
  closeSetTypePopup();
  _activeSetTypeRow = setn;
  const popup = document.createElement("div");
  popup.className = "set-type-popup";
  popup.innerHTML = Object.entries(SET_TYPE_META).map(([key,m])=>
    `<button onmousedown="applySetType(event,'${key}')"><span class="stp-badge ${m.cls}">${m.badge}</span>${m.label}</button>`
  ).join("");
  setn.appendChild(popup);
}

function applySetType(e, type){
  e.preventDefault(); e.stopPropagation();
  const setn = _activeSetTypeRow;
  if(!setn) return;
  const m = SET_TYPE_META[type];
  if(type==="normal"){
    // Restore the S# count from the row's position in the sets container
    const row = setn.closest(".setrow");
    const setsEl = row && row.parentElement;
    const idx = setsEl ? [...setsEl.children].indexOf(row) : 0;
    setn.textContent = "S"+(idx+1);
  } else {
    setn.textContent = m.badge;
  }
  setn.dataset.type = m.dataType;
  closeSetTypePopup();
}

function closeSetTypePopup(){
  document.querySelectorAll(".set-type-popup").forEach(p=>p.remove());
  _activeSetTypeRow = null;
}

function setnLabel(si, type){
  if(type==="warmup") return "<span data-type=\"warmup\">W</span>";
  if(type==="dropset") return "<span data-type=\"dropset\">D</span>";
  if(type==="failure") return "<span data-type=\"failure\">F</span>";
  return "S"+(si+1);
}

function makeSetRow(si, pw, pr, type){
  const badge = type||"";
  const label = badge==="warmup"?"W" : badge==="dropset"?"D" : badge==="failure"?"F" : "S"+(si+1);
  return `<div class="setrow" data-pw="${pw}" data-pr="${pr}">
    <div class="setn" data-type="${badge}" onclick="openSetTypePopup(this)">${label}</div>
    <div class="field">
      <input type="number" inputmode="decimal" step="0.5" min="0" class="w-input" placeholder="${pw!==''?pw+' kg':'kg'}" oninput="updateSetIndicator(this)">
      <span class="trend-ind"></span>
    </div>
    <div class="field">
      <input type="number" inputmode="numeric" min="0" class="r-input" placeholder="${pr!==''?pr+' reps':'reps'}" oninput="updateSetIndicator(this)">
      <span class="trend-ind"></span>
    </div>
    <button class="tick" onclick="tick(this)">&#10003;</button>
    <button class="remove-set" onclick="removeSet(this)" aria-label="Remove set">&times;</button>
  </div>`;
}
function renumber(setsEl){ [...setsEl.children].forEach((row,idx)=>{ const setn=row.querySelector(".setn"); if(setn&&!setn.dataset.type) setn.textContent="S"+(idx+1); }); }

// Shared set formatter for history/reports — shows W/D/F badge inline
function fmtSet(s){
  const tag = s.type==="warmup" ? `<span class="set-type-tag warmup">W</span>` :
              s.type==="dropset" ? `<span class="set-type-tag dropset">D</span>` :
              s.type==="failure" ? `<span class="set-type-tag failure">F</span>` : "";
  return `${tag}${s.w||"?"}kg×${s.r||"?"}`;
}
function fmtSetPlain(s){
  const prefix = s.type==="warmup"?"[W] " : s.type==="dropset"?"[D] " : s.type==="failure"?"[F] " : "";
  return `${prefix}${s.w||"?"}kg×${s.r||"?"}`;
}

function updateSetIndicator(inputEl){
  const row = inputEl.closest(".setrow");
  const indicator = inputEl.parentElement.querySelector(".trend-ind");
  if(!row || !indicator) return;
  const isWeight = inputEl.classList.contains("w-input");
  const prevRaw = isWeight ? row.dataset.pw : row.dataset.pr;
  const prev = prevRaw!=="" ? parseFloat(prevRaw) : null;
  const curRaw = inputEl.value.trim();
  const cur = curRaw!=="" ? parseFloat(curRaw) : null;
  if(prev===null || cur===null || isNaN(prev) || isNaN(cur)){
    indicator.className = "trend-ind";
    indicator.innerHTML = "";
    return;
  }
  if(cur>prev){ indicator.className="trend-ind up"; indicator.innerHTML="&#9650;"; }
  else if(cur<prev){ indicator.className="trend-ind down"; indicator.innerHTML="&#9660;"; }
  else { indicator.className="trend-ind same"; indicator.innerHTML="&#8212;"; }
}

function tick(btn){
  const row = btn.closest(".setrow");
  const w = row.querySelector(".w-input"), r = row.querySelector(".r-input");
  const pw = row.dataset.pw, pr = row.dataset.pr;
  if(!btn.classList.contains("on")){
    if(!w.value && pw!=="") w.value = pw;
    if(!r.value && pr!=="") r.value = pr;
    btn.classList.add("on");
  } else btn.classList.remove("on");
  updateSetIndicator(w);
  updateSetIndicator(r);
  checkDone(btn.closest(".ex"));
}
function checkDone(exEl){
  if(!exEl) return;
  const ticks = exEl.querySelectorAll(".tick"), on = exEl.querySelectorAll(".tick.on");
  exEl.classList.toggle("done", ticks.length>0 && ticks.length===on.length);
}
function addSet(ei, e){
  e.preventDefault();
  const c=$("sets"+ei);
  c.insertAdjacentHTML("beforeend", makeSetRow(c.children.length, "", ""));
}
function removeSet(btn){
  const row = btn.closest(".setrow"), setsEl = row.closest(".sets"), exEl = btn.closest(".ex");
  if(setsEl.children.length<=1){ showToast("Keep at least one set", false); return; }
  row.remove(); renumber(setsEl); checkDone(exEl);
}

async function saveSession(id){
  const p = PLAN.find(x=>x.id===id);
  const ex = [];
  p.ex.forEach((e,i)=>{
    const c = $("sets"+i);
    if(e.superset){
      // Each ss-set-pair contains two ss-rows (A and B) — collect them separately
      const setsA=[], setsB=[];
      [...c.querySelectorAll(".ss-set-pair")].forEach(pair=>{
        const rows = [...pair.querySelectorAll(".ss-row")];
        const rowA = rows[0], rowB = rows[1];
        if(rowA){
          const w=rowA.querySelector(".w-input").value.trim();
          const r=rowA.querySelector(".r-input").value.trim();
          if(w||r) setsA.push({w:w?parseFloat(w):"", r:r?parseInt(r):""});
        }
        if(rowB){
          const w=rowB.querySelector(".w-input").value.trim();
          const r=rowB.querySelector(".r-input").value.trim();
          if(w||r) setsB.push({w:w?parseFloat(w):"", r:r?parseInt(r):""});
        }
      });
      if(setsA.length) ex.push({n:e.exA.n, sets:setsA, supersetGroup:i});
      if(setsB.length) ex.push({n:e.exB.n, sets:setsB, supersetGroup:i});
    } else {
      const sets=[];
      [...c.children].forEach(row=>{
        const w=row.querySelector(".w-input").value.trim();
        const r=row.querySelector(".r-input").value.trim();
        if(w||r){
          const type = row.querySelector(".setn")?.dataset?.type||"";
          const entry = {w:w?parseFloat(w):"", r:r?parseInt(r):""};
          if(type) entry.type = type;
          sets.push(entry);
        }
      });
      if(sets.length) ex.push({n:e.n, sets});
    }
  });

  if(!ex.length){ showToast("Log at least one set first", false); return; }

  // Spot new personal records before this session is added to history
  const prHits = [];
  ex.forEach(e=>{
    const priorBest = allTimeBest(e.n);
    let sessionMax = null;
    e.sets.forEach(s=>{
      const w = parseFloat(s.w);
      if(isNaN(w)) return;
      if(!sessionMax || w>sessionMax) sessionMax = w;
    });
    if(sessionMax!==null && (!priorBest || sessionMax>priorBest.weight)){
      prHits.push(`${e.n.split("(")[0].trim()} ${sessionMax}kg`);
    }
  });

  const duration = elapsedMinutes();
  LOG.push({sessionId:id, date:new Date().toISOString(), duration, ex});
  const ok = await saveLog();
  stopTimer();
  cancelRest();
  if(!ok){
    showToast("Couldn't save \u2014 check your connection");
    LOG.pop(); // don't keep an unsaved entry in memory if the write failed
    setTimeout(home, 1000);
  } else {
    if(prHits.length){
      showToast(`\u{1F3C6} New PR: ${prHits.slice(0,2).join(", ")}${prHits.length>2?` +${prHits.length-2} more`:""}`);
    } else {
      showToast("Session saved & synced \u2713");
    }
    setTimeout(()=>showPostSessionSummary(ex, prHits), 1200);
  }
}

function showHistory(){
  if(!LOG.length){

      <div class="empty"><strong>No sessions yet</strong>Log your first session and it'll appear here.</div>`;
    return;
  }
  const sorted = [...LOG].map((w,i)=>({...w,_i:i})).sort((a,b)=>b.date.localeCompare(a.date));
  const html = sorted.map(w=>{

    const rows = w.ex.map(e=>`<div class="hrow"><div class="hn">${e.n}</div><div class="hv">${e.sets.map(s=>fmtSet(s)).join("  ")}</div></div>`).join("");
    const rpeBadge = (w.rpe!=null) ? `<span class="session-rpe-badge">RPE ${w.rpe}</span>` : "";
    const commentHtml = w.comment ? `<div class="session-comment">&ldquo;${w.comment}&rdquo;</div>` : "";
    return `<div class="hday">

      ${rows}
      ${commentHtml}
      <button class="del-btn" onclick="delEntry(${w._i})">Remove this entry</button>
    </div>`;

}
async function delEntry(i){
  if(!confirm("Remove this session? This can't be undone.")) return;
  LOG.splice(i,1);
  await saveLog();
  showHistory();
}

async function deduplicateHiitLog(){
  // For each HIIT class on each calendar day, keep only the longest entry.
  // Runs once at boot to fix any duplicates already in Firestore, and is a
  // no-op when there's nothing to clean up so it costs nothing on repeat logins.
  const hiitEntries = LOG.filter(s=>s.hiit);
  if(hiitEntries.length < 2) return;
  const seen = {};
  const toRemove = new Set();
  hiitEntries.forEach(s=>{
    const key = `${s.sessionId}::${localDayKey(s.date)}`;
    const idx = LOG.indexOf(s);
    if(seen[key]===undefined){
      seen[key] = idx;
    } else {
      const prevIdx = seen[key];
      if((s.duration||0) > (LOG[prevIdx].duration||0)){
        toRemove.add(prevIdx);
        seen[key] = idx;
      } else {
        toRemove.add(idx);
      }
    }
  });
  if(toRemove.size===0) return;
  LOG = LOG.filter((_,i)=>!toRemove.has(i));
  await saveLog();
}

// ── Body weight tracker ──────────────────────────────────
function sortedWeights(){ return [...WEIGHTS].sort((a,b)=>a.date.localeCompare(b.date)); }

function changeSince(sorted, days, key="weight"){
  if(sorted.length<2) return null;
  const last = sorted[sorted.length-1];
  const cutoff = new Date(last.date).getTime() - days*86400000;
  let ref = null;
  for(const w of sorted){ if(new Date(w.date).getTime() <= cutoff) ref = w; }
  if(!ref || ref===last) return null;
  return last[key] - ref[key];
}

function deltaHtml(delta, decimals=1){
  if(delta===null || delta===undefined) return `<span class="value flat">&mdash;</span>`;
  const cls = delta>0.05 ? "up" : delta<-0.05 ? "down" : "flat";
  const arrow = delta>0.05 ? "&#9650;" : delta<-0.05 ? "&#9660;" : "&#8212;";
  return `<span class="value ${cls}">${arrow} ${Math.abs(delta).toFixed(decimals)}kg</span>`;
}

// ── Bar charts (dashboard) ────────────────────────────────
function buildBarChartSVG(items, opts={}){
  const color = opts.color || "var(--accent)";
  const labelEvery = opts.labelEvery || 1;
  const unit = opts.unit || "";
  const showValues = opts.showValues!==false;
  const W=560, H=190, padL=26, padR=10, padT=18, padB=30;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const maxV = Math.max(...items.map(i=>i.value), 1);
  const n = items.length;
  const slot = plotW/n;
  const barW = Math.max(slot*0.55, 3);
  const bars = items.map((it,i)=>{
    const h = (it.value/maxV)*plotH;
    const x = padL + slot*i + (slot-barW)/2;
    const y = padT + plotH - h;
    const showLabel = (i % labelEvery === 0) || i===n-1;
    const valueLabel = (showValues && it.value>0) ? `<text x="${(x+barW/2).toFixed(1)}" y="${(y-4).toFixed(1)}" fill="var(--mute)" font-size="9" text-anchor="middle">${it.value}${unit}</text>` : "";
    return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(h,1).toFixed(1)}" rx="3" fill="${color}"/>
      ${valueLabel}
      ${showLabel ? `<text x="${(x+barW/2).toFixed(1)}" y="${H-8}" fill="var(--mute)" font-size="9" text-anchor="middle">${it.label}</text>` : ""}`;
  }).join("");
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <line x1="${padL}" y1="${padT+plotH}" x2="${W-padR}" y2="${padT+plotH}" stroke="var(--line)" stroke-width="1"/>
    ${bars}
  </svg>`;
}

function buildStackedBarChartSVG(items, seriesKeys, colors, opts={}){
  const showValues = opts.showValues!==false;
  const labelEvery = opts.labelEvery || 1;
  const W=560, H=190, padL=26, padR=10, padT=18, padB=30;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const totals = items.map(it => seriesKeys.reduce((s,k)=>s+(it[k]||0),0));
  const maxV = Math.max(...totals, 1);
  const n = items.length;
  const slot = plotW/n;
  const barW = Math.max(slot*0.55, 3);
  const bars = items.map((it,i)=>{
    const x = padL + slot*i + (slot-barW)/2;
    let cursorY = padT + plotH;
    let segs = "";
    seriesKeys.forEach(k=>{
      const v = it[k]||0;
      const h = (v/maxV)*plotH;
      cursorY -= h;
      if(v>0) segs += `<rect x="${x.toFixed(1)}" y="${cursorY.toFixed(1)}" width="${barW.toFixed(1)}" height="${Math.max(h,1).toFixed(1)}" fill="${colors[k]}"/>`;
    });
    const total = totals[i];
    const totalLabel = (showValues && total>0) ? `<text x="${(x+barW/2).toFixed(1)}" y="${(cursorY-4).toFixed(1)}" fill="var(--mute)" font-size="9" text-anchor="middle">${total}</text>` : "";
    const showLabel = (i % labelEvery === 0) || i===n-1;
    return `${segs}${totalLabel}${showLabel ? `<text x="${(x+barW/2).toFixed(1)}" y="${H-8}" fill="var(--mute)" font-size="9" text-anchor="middle">${it.label}</text>` : ""}`;
  }).join("");
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    <line x1="${padL}" y1="${padT+plotH}" x2="${W-padR}" y2="${padT+plotH}" stroke="var(--line)" stroke-width="1"/>
    ${bars}
  </svg>`;
}

function dailyVisitBuckets(log, daysBack){
  const today = new Date(); today.setHours(0,0,0,0);
  const days = [];
  for(let i=daysBack-1;i>=0;i--){
    const d = new Date(today); d.setDate(today.getDate()-i);
    const key = localDayKey(d);
    const inDay = log.filter(s=>localDayKey(s.date)===key);
    const label = daysBack<=7 ? d.toLocaleDateString("en-GB",{weekday:"short"}) : String(d.getDate());
    days.push({label, value:inDay.length, gym:inDay.filter(s=>!s.hiit).length, hiit:inDay.filter(s=>s.hiit).length});
  }
  return days;
}

function dailyMinutesBuckets(log, daysBack){
  const today = new Date(); today.setHours(0,0,0,0);
  const days = [];
  for(let i=daysBack-1;i>=0;i--){
    const d = new Date(today); d.setDate(today.getDate()-i);
    const key = localDayKey(d);
    const mins = log.filter(s=>localDayKey(s.date)===key).reduce((sum,s)=>sum+(s.duration||0),0);
    const label = daysBack<=7 ? d.toLocaleDateString("en-GB",{weekday:"short"}) : String(d.getDate());
    days.push({label, value:mins});
  }
  return days;
}

function buildTrendChartSVG(pairs){
  if(pairs.length<2){
    return `<div class="chart-empty">Log at least two entries to see a trend line here.</div>`;
  }
  const W=560, H=200, padL=38, padR=12, padT=16, padB=24;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const times = pairs.map(w=>new Date(w.date).getTime());
  const vals = pairs.map(w=>w.value);
  const minT=Math.min(...times), maxT=Math.max(...times);
  const minW=Math.min(...vals), maxW=Math.max(...vals);
  const range = Math.max(maxW-minW, 0.5);
  const pad = Math.max(range*0.2, 0.5);
  const loY = minW-pad, hiY = maxW+pad;
  const x = t => padL + (maxT>minT ? (t-minT)/(maxT-minT) : 0.5) * plotW;
  const y = v => padT + plotH - (v-loY)/(hiY-loY) * plotH;
  const pts = pairs.map((w,i)=>[x(times[i]), y(w.value)]);
  const lineD = pts.map((p,i)=>(i===0?"M":"L")+p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  const areaD = lineD + ` L${pts[pts.length-1][0].toFixed(1)},${(padT+plotH).toFixed(1)} L${pts[0][0].toFixed(1)},${(padT+plotH).toFixed(1)} Z`;
  const circles = pts.map((p,i)=>{
    const last = i===pts.length-1;
    return `<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="${last?5:3}" fill="${last?"var(--accent)":"var(--good)"}" stroke="${"#15181f"}" stroke-width="1.5"/>`;
  }).join("");
  const gridY = [loY, (loY+hiY)/2, hiY];
  const gridlines = gridY.map(v=>{
    const yy=y(v).toFixed(1);
    return `<line x1="${padL}" y1="${yy}" x2="${W-padR}" y2="${yy}" stroke="var(--line)" stroke-width="1"/>
      <text x="${padL-6}" y="${yy}" fill="var(--mute)" font-size="10" text-anchor="end" dominant-baseline="middle">${v.toFixed(1)}</text>`;
  }).join("");
  const firstLabel = fmtDate(pairs[0].date);
  const lastLabel = fmtDate(pairs[pairs.length-1].date);
  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
    ${gridlines}
    <path d="${areaD}" fill="var(--accent)" opacity="0.12"/>
    <path d="${lineD}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${circles}
    <text x="${padL}" y="${H-6}" fill="var(--mute)" font-size="10">${firstLabel}</text>
    <text x="${W-padR}" y="${H-6}" fill="var(--mute)" font-size="10" text-anchor="end">${lastLabel}</text>
  </svg>`;
}
function buildWeightChartSVG(sorted){
  return buildTrendChartSVG(sorted.map(w=>({date:w.date, value:w.weight})));
}

// ── Cardio tracker (distance + time, separate from gym sessions) ──
function showCardioTracker(editIdx){
  stopTimer();
  const sorted = [...CARDIO_LOG].sort((a,b)=>a.date.localeCompare(b.date));

  // Use localDayKey comparisons (YYYY-MM-DD) rather than full ISO timestamps —
  // cardio entries are stored with a noon local-time stamp which in BST becomes
  // 11:00 UTC, so a moment-based `< now` check excludes same-day entries logged
  // before noon if the user is checking earlier in the morning.
  const todayKey = localDayKey(new Date());
  const weekStartDate = new Date();
  const dow = weekStartDate.getDay();
  weekStartDate.setDate(weekStartDate.getDate() - (dow===0?6:dow-1));
  const weekStartKey = localDayKey(weekStartDate);

  const thisWeek = CARDIO_LOG.filter(c=>{
    const dk = localDayKey(c.date);
    return dk >= weekStartKey && dk <= todayKey;
  });
  const weekDist = thisWeek.reduce((s,c)=>s+(c.distance||0),0);
  const weekDur = thisWeek.reduce((s,c)=>s+(c.duration||0),0);

  const statRow = `<div class="stat-row">
    <div class="stat-card"><div class="label">Distance this week</div><div class="value">${weekDist.toFixed(1)}km</div></div>
    <div class="stat-card"><div class="label">Time this week</div><div class="value">${fmtDuration(weekDur)}</div></div>
  </div>`;

  const distancePairs = sorted.filter(c=>c.distance>0).map(c=>({date:c.date, value:c.distance}));
  const chart = `<div class="section-label">Distance trend</div><div class="chart-card">${buildTrendChartSVG(distancePairs)}</div>`;

  const today = localDayKey(new Date());
  const options = CARDIO_ACTIVITIES.map(a=>`<option value="${a}">${a}</option>`).join("");

  const editing = editIdx!=null && CARDIO_LOG[editIdx];
  const prefill = editing ? CARDIO_LOG[editIdx] : null;
  const prefillDate = prefill ? localDayKey(prefill.date) : today;
  const prefillOptions = CARDIO_ACTIVITIES.map(a=>`<option value="${a}" ${prefill&&prefill.activity===a?"selected":""}>${a}</option>`).join("");

  const form = `<div class="cardio-form" ${editing?'style="border-color:var(--accent2)"':""}>
    ${editing?`<div class="section-label" style="margin:0 0 8px;color:var(--accent2)">Editing \u2014 make changes then tap Update</div>`:""}
    <select id="cActivity">${editing?prefillOptions:options}</select>
    <div class="cardio-form-row">
      <input type="date" id="cDate" value="${editing?prefillDate:today}">
      <input type="number" inputmode="decimal" step="0.1" min="0" id="cDistance" placeholder="km" value="${prefill&&prefill.distance?prefill.distance:""}">
      <input type="number" inputmode="numeric" min="0" id="cDuration" placeholder="mins" value="${prefill&&prefill.duration?prefill.duration:""}">
    </div>
    ${editing
      ? `<button onclick="updateCardioEntry(${editIdx})">Update</button>
         <button class="auth-link-btn" style="margin-top:4px" onclick="showCardioTracker()">Cancel</button>`
      : `<button onclick="saveCardioEntry()">Log cardio</button>`
    }
  </div>`;

  const rows = CARDIO_LOG.map((c,i)=>({...c,_i:i})).sort((a,b)=>b.date.localeCompare(a.date)).map(c=>`
    <div class="wrow${c._i===editIdx?" wrow-editing":""}">
      <div class="wd">${c.activity} &middot; ${fmtDate(c.date)}</div>
      <div class="wright">
        <span class="wv" style="font-size:13px">${c.distance>0?`${c.distance}km &middot; `:""}${fmtDuration(c.duration)}</span>
        <button class="wedit" onclick="showCardioTracker(${c._i})" aria-label="Edit">&#9998;</button>
        <button class="wdel" onclick="deleteCardioEntry(${c._i})" aria-label="Delete">&times;</button>
      </div>
    </div>`).join("");

  const historyBlock = CARDIO_LOG.length
    ? `<div class="section-label">History</div><div class="hday">${rows}</div>`
    : `<div class="chart-empty">No cardio logged yet &mdash; add your first session below.</div>`;

  app.innerHTML = `
    <div class="topbar">
      <button class="back" onclick="home()">&#8592; Back</button>
      <div class="topbar-info"><h2>Cardio</h2><div class="focus">${CURRENT_PROFILE.name}</div></div>
    </div>
    ${statRow}
    ${chart}
    ${form}
    ${historyBlock}
  `;
  if(editing) document.querySelector(".cardio-form")?.scrollIntoView({behavior:"smooth",block:"center"});
  else window.scrollTo(0,0);
}

function sessionLabelForLog(entries, planToUse){
  if(!entries || !entries.length) return null;
  const e = entries[0];
  if(e.hiit) return e.hiitName || "HIIT";
  const planEntry = (planToUse||PLAN).find(p=>p.id===e.sessionId);
  return planEntry ? planEntry.name : (e.sessionId || "Session");
}

function trainedDaysLabelMap(log, planToUse){
  const byDay = {};
  log.forEach(e=>{
    const key = localDayKey(e.date);
    if(!byDay[key]) byDay[key] = [];
    byDay[key].push(e);
  });
  const labelMap = {};
  Object.keys(byDay).forEach(key=>{ labelMap[key] = sessionLabelForLog(byDay[key], planToUse); });
  return labelMap;
}

function buildMonthCalendarHTML(year, month, labelMap){
  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const startDow = (firstDay.getDay()+6)%7; // Monday-start week

  let cells = "";
  for(let i=0;i<startDow;i++) cells += `<div class="cal-cell empty"></div>`;
  for(let d=1; d<=daysInMonth; d++){
    const key = localDayKey(new Date(year, month, d));
    const label = labelMap[key];
    cells += label
      ? `<div class="cal-cell trained"><div class="cal-daynum">${d}</div><div class="cal-label">${label}</div></div>`
      : `<div class="cal-cell"><div class="cal-daynum">${d}</div></div>`;

  return `<div class="cal-weekdays"><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span><span>Sun</span></div>
    <div class="cal-grid">${cells}</div>`;
}

// ── Weekly check-in ───────────────────────────────────────
// Week key is the Monday date string (YYYY-MM-DD) — unambiguous and timezone-safe.
// The check-in is "due" on Sunday but can be submitted or viewed any time after.
function weekKeyForDate(d){
  const dt = new Date(d);
  const day = dt.getDay(); // 0=Sun
  const diffToMon = day===0 ? -6 : 1-day;
  const mon = new Date(dt);
  mon.setDate(dt.getDate() + diffToMon);
  return localDayKey(mon);
}
function weekKeyForSunday(sundayDate){
  // Sunday belongs to the week that started the previous Monday
  const mon = new Date(sundayDate);
  mon.setDate(sundayDate.getDate() - 6);
  return localDayKey(mon);
}
function weekSunday(weekKey){
  // Given a Monday-date week key, return the following Sunday
  const mon = new Date(weekKey + "T12:00:00");
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  return sun;
}
function currentWeekKey(){
  return weekKeyForDate(new Date());
}
function pendingCheckInWeekKey(){
  // Returns the most recent week key (Mon YYYY-MM-DD) that has ended (Sunday
  // has passed) but has no submitted check-in — going back up to 4 weeks.
  // Returns null if everything is up to date.
  const today = new Date();
  for(let weeksBack = 1; weeksBack <= 4; weeksBack++){
    const candidate = new Date(today);
    candidate.setDate(today.getDate() - weeksBack * 7);
    const wk = weekKeyForDate(candidate);
    const sun = weekSunday(new Date(wk + "T12:00:00"));
    // Only include weeks whose Sunday has actually passed
    if(sun > today) continue;
    if(!CHECKINS.some(c=>c.weekKey===wk && c.submitted)) return wk;
  }
  return null;
}
function isCheckInDue(){
  return !!pendingCheckInWeekKey();
}

const TRAINER_FEEDBACK_EMOJIS = ["👍","💪","🔥","❤️","👏","🙌"];
const TRAINER_FEEDBACK_PHRASES = [
  "Great week!","Keep it up!","Impressive consistency",
  "You're making progress","Let's push harder next week",
  "Rest up and recover","Brilliant effort"
];

const VOLUME_COMPARISONS = [
  {label:"African elephants",    emoji:"🐘", kg:6000},
  {label:"Mini Coopers",         emoji:"🚗", kg:1160},
  {label:"Smart cars",           emoji:"🚙", kg:750},
  {label:"grizzly bears",        emoji:"🐻", kg:270},
  {label:"male lions",           emoji:"🦁", kg:190},
  {label:"washing machines",     emoji:"🫧", kg:75},
  {label:"golden retrievers",    emoji:"🐕", kg:32},
  {label:"grand pianos",         emoji:"🎹", kg:480},
  {label:"vending machines",     emoji:"📦", kg:340},
  {label:"Fiat 500s",            emoji:"🏎️", kg:1020},
];

function volumeComparison(volumeKg, weekKey){
  if(volumeKg < 10) return null;
  // Seed from weekKey so the same week always shows the same comparison,
  // but different weeks rotate through the list naturally
  const seed = weekKey.replace(/-/g,"").split("").reduce((s,c)=>s+c.charCodeAt(0),0);
  const good = VOLUME_COMPARISONS.filter(c=>{ const n=volumeKg/c.kg; return n>=0.3&&n<=25; });
  const pool = good.length ? good : VOLUME_COMPARISONS;
  const pick = pool[seed % pool.length];
  const n = volumeKg / pick.kg;
  const nStr = n < 2 ? n.toFixed(1) : Math.round(n).toString();
  return `${pick.emoji} That's the weight of ${nStr} ${pick.label}`;
}

function weekPBs(log, weekKey){
  const monDate = new Date(weekKey + "T00:00:00");
  const sunDate = new Date(weekKey + "T00:00:00");
  sunDate.setDate(sunDate.getDate()+6); sunDate.setHours(23,59,59,999);
  const wLog = log.filter(s=>{ const d=new Date(s.date); return d>=monDate&&d<=sunDate; });
  const beforeLog = log.filter(s=>new Date(s.date)<monDate);
  const priorBest = {};
  beforeLog.forEach(session=>{
    (session.ex||[]).forEach(e=>{
      (e.sets||[]).forEach(s=>{
        const w=parseFloat(s.w)||0, r=parseInt(s.r)||0;
        if(w>0 && (!priorBest[e.n]||w>priorBest[e.n].w||(w===priorBest[e.n].w&&r>priorBest[e.n].r)))
          priorBest[e.n]={w,r};
      });
    });
  });
  const weekBest = {};
  wLog.forEach(session=>{
    (session.ex||[]).forEach(e=>{
      (e.sets||[]).forEach(s=>{
        const w=parseFloat(s.w)||0, r=parseInt(s.r)||0;
        if(w>0 && (!weekBest[e.n]||w>weekBest[e.n].w||(w===weekBest[e.n].w&&r>weekBest[e.n].r)))
          weekBest[e.n]={w,r};
      });
    });
  });
  return Object.entries(weekBest)
    .filter(([name,best])=>!priorBest[name]||best.w>priorBest[name].w||(best.w===priorBest[name].w&&best.r>priorBest[name].r))
    .map(([name,best])=>({name:name.replace(/\(.*?\)/g,"").trim(), weight:best.w, reps:best.r}));
}

function compileWeekMetrics(log, weights, cardioLog, weekKey){
  const monDate = new Date(weekKey + "T00:00:00");
  const sunDate = weekSunday(new Date(weekKey + "T00:00:00"));
  const sunEnd = new Date(sunDate); sunEnd.setHours(23,59,59,999);
  const wLog = log.filter(s=>{ const d=new Date(s.date); return d>=monDate && d<=sunEnd; });
  const sessions = wLog.length;
  const duration = wLog.reduce((s,e)=>s+(e.duration||0), 0);
  const volume = wLog.reduce((s,e)=>s+(e.ex||[]).reduce((s2,x)=>s2+(x.sets||[]).reduce((s3,st)=>s3+(parseFloat(st.w)||0)*(parseInt(st.r)||0),0),0), 0);
  const sets = wLog.reduce((s,e)=>s+(e.ex||[]).reduce((s2,x)=>s2+(x.sets||[]).length,0), 0);
  const muscleVols = computeMuscleVolume(wLog);
  const topMuscle = Object.entries(muscleVols).filter(([,v])=>v>0).sort((a,b)=>b[1]-a[1])[0];
  const topMuscleLabel = topMuscle ? (MUSCLE_GROUP_LABELS[topMuscle[0]]||topMuscle[0]) : null;
  const wWeights = weights.filter(w=>{ const d=new Date(w.date); return d>=monDate && d<=sunEnd; });
  const lastWeight = wWeights.length ? wWeights[wWeights.length-1].w : null;
  const wCardio = cardioLog.filter(c=>{ const d=new Date(c.date); return d>=monDate && d<=sunEnd; });
  const cardioDist = wCardio.reduce((s,c)=>s+(c.distance||0), 0);
  const cardioDur = wCardio.reduce((s,c)=>s+(c.duration||0), 0);
  const streak = weekStreakFor(log);
  const pbs = weekPBs(log, weekKey);
  const volComparison = volumeComparison(Math.round(volume), weekKey);
  return {sessions, duration, volume: Math.round(volume), sets, topMuscleLabel,
          lastWeight, cardioDist, cardioDur, streak, pbs, volComparison, weekKey,
          monday: monDate.toLocaleDateString("en-GB",{day:"numeric",month:"short"}),
          sunday: sunDate.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})};
}

  pendingFeedbackEmoji = e;
  document.querySelectorAll(".feedback-emoji-btn").forEach(b=>b.classList.toggle("active", b.textContent===e));
}

  pendingFeedbackPhrase = TRAINER_FEEDBACK_PHRASES[idx]||"";

async function submitTrainerFeedback(){
  const form = document.getElementById("feedbackForm");
  if(!form){ showToast("Something went wrong", false); return; }
  if(!pendingFeedbackEmoji && !pendingFeedbackPhrase){ showToast("Pick an emoji or a phrase first", false); return; }
  const weekKey = form.dataset.checkinKey;
  const clientId = form.dataset.clientId;
  if(!clientId){ showToast("Couldn't identify the client", false); return; }

  try{
    const snap = await getDoc(doc(db, "trackers", `${TRACKER_ID}-${clientId}`));
    const clientData = snap.exists() ? snap.data() : {};
    const checkIns = clientData.checkIns || [];
    const ci = checkIns.find(c=>c.weekKey===weekKey);
    if(!ci){ showToast("Check-in not found", false); return; }
    ci.trainerFeedback = {
      emoji: pendingFeedbackEmoji,
      phrase: pendingFeedbackPhrase,
      trainerId: CURRENT_PROFILE.id,
      trainerName: CURRENT_PROFILE.name,
      sentAt: new Date().toISOString()
    };
    await setDoc(doc(db, "trackers", `${TRACKER_ID}-${clientId}`), {checkIns}, {merge:true});
    showToast("Feedback sent \u2713");
    pendingFeedbackEmoji = ""; pendingFeedbackPhrase = "";
    showClientCheckins(clientId);
  }catch(e){
    showToast("Couldn't send feedback \u2014 check your connection", false);
  }
}

async function submitWeeklyCheckin(weekKey){
  const weight = parseFloat(document.getElementById("ciWeight")?.value)||null;
  const comment = (document.getElementById("ciComment")?.value||"").trim();
  const existing = CHECKINS.findIndex(c=>c.weekKey===weekKey);
  const ci = {
    weekKey,
    submitted: true,
    submittedAt: new Date().toISOString(),
    bodyWeight: weight,
    comment,
  };
  if(existing>=0) CHECKINS[existing] = {...CHECKINS[existing], ...ci};
  else CHECKINS.push(ci);
  if(weight) WEIGHTS.push({date: new Date().toISOString(), w: weight});
  const ok = await saveLog();
  showToast(ok ? "Check-in submitted \u2713" : "Couldn't save \u2014 check your connection");
  if(ok) showCheckinHistory();
}

async function saveMeasurementEntry(){
  const dateVal = $("mDate").value;
  const waist = parseFloat($("mWaist").value);
  const chest = parseFloat($("mChest").value);
  const arms = parseFloat($("mArms").value);
  if(!dateVal || (isNaN(waist) && isNaN(chest) && isNaN(arms))){
    showToast("Enter a date and at least one measurement", false);
    return;
  }
  const iso = new Date(dateVal+"T12:00:00").toISOString();
  const dayStr = iso.slice(0,10);
  let entry = MEASUREMENTS.find(e=>e.date.slice(0,10)===dayStr);
  if(!entry){ entry = {date: iso}; MEASUREMENTS.push(entry); }
  if(!isNaN(waist)) entry.waist = Math.round(waist*10)/10;
  if(!isNaN(chest)) entry.chest = Math.round(chest*10)/10;
  if(!isNaN(arms)) entry.arms = Math.round(arms*10)/10;
  const ok = await saveLog();
  showToast(ok ? "Measurements saved & synced \u2713" : "Couldn't save \u2014 check your connection");
  renderMeasurementsScreen();
}

async function deleteMeasurementEntry(idx){
  if(!confirm("Remove this measurement entry?")) return;
  MEASUREMENTS.splice(idx,1);
  await saveLog();
  renderMeasurementsScreen();
}

function slugify(name){
  return name.toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/(^-|-$)/g,"") || "session";
}
function uniqueSessionId(name){
  const base = slugify(name);
  let id = base, n = 2;
  while(PLAN.some(p=>p.id===id)){ id = `${base}-${n}`; n++; }
  return id;
}

async function moveSessionInPlan(id, dir){
  const idx = PLAN.findIndex(p=>p.id===id);
  if(idx<0) return;

  [PLAN[idx], PLAN[newIdx]] = [PLAN[newIdx], PLAN[idx]];
  await saveLog();
  showSettings();
}

// Setters routed through real functions rather than direct variable access in
// inline attributes, since inline handlers run in global scope and can't see
// this module's "let draftSession" closure variable.
function setDraftName(v){ draftSession.name = v; }
function setDraftFocus(v){ draftSession.focus = v; }
function setDraftExSets(i,v){ draftSession.ex[i].s = parseInt(v)||1; }
function setDraftExReps(i,v){ draftSession.ex[i].r = v; }
function setDraftExNote(i,v){ draftSession.ex[i].note = v; }
function setDraftSupersetReps(i,side,v){
  if(side==="A") draftSession.ex[i].exA.r = v;
  else draftSession.ex[i].exB.r = v;
}

function addDraftSuperset(){
